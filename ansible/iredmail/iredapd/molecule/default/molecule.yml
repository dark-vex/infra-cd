---
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: iredapd-test
    image: geerlingguy/docker-debian12-ansible:latest
    pre_build_image: true
    privileged: true
    command: /lib/systemd/systemd
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      - /run
      - /tmp
provisioner:
  name: ansible
  playbooks:
    converge: converge.yml
  inventory:
    host_vars:
      iredapd-test:
        ansible_python_interpreter: /usr/bin/python3
verifier:
  name: ansible
