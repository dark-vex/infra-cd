---
# Molecule converge wrapper for iredapd settings update.
# Pre-creates the /opt/iredapd/settings.py stub that the playbook expects,
# then runs update_iredapd_settings.yml against the test container.
- name: Prepare iredapd environment
  hosts: all
  become: true
  gather_facts: false

  tasks:
    - name: Ensure /opt/iredapd directory exists
      ansible.builtin.file:
        path: /opt/iredapd
        state: directory
        mode: '0755'

    - name: Create stub settings.py
      ansible.builtin.copy:
        dest: /opt/iredapd/settings.py
        content: |
          # iRedAPD settings stub for molecule testing
          backend = 'ldap'
          ALLOWED_LOGIN_MISMATCH_SENDERS = []
        mode: '0644'
        force: false

    - name: Install stub iredapd systemd unit (test-only)
      ansible.builtin.copy:
        dest: /etc/systemd/system/iredapd.service
        mode: '0644'
        content: |
          [Unit]
          Description=iRedAPD stub for molecule tests
          [Service]
          Type=simple
          ExecStart=/bin/sleep infinity
          [Install]
          WantedBy=multi-user.target

    - name: Start the stub iredapd service
      ansible.builtin.systemd:
        name: iredapd
        state: started
        enabled: true
        daemon_reload: true

- name: Converge
  ansible.builtin.import_playbook: ../../update_iredapd_settings.yml
