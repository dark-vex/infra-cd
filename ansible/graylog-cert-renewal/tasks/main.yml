---
# ---------------------------------------------------------------------------
# certbot — Let's Encrypt renewal follow-through for Graylog's OTel input
# ---------------------------------------------------------------------------
# This role does NOT issue the initial certificate and does NOT touch any
# existing certbot install/config — the live state of the box's ACME client
# (apt vs snap vs none, challenge method, existing renewal config) was not
# accessible from the session that authored this role and must be confirmed
# on the box first (see playbook.yml header). It only:
#   1. installs certbot via apt if no certbot binary is found at all
#   2. enables certbot's systemd timer, but only on that fresh-install path
#      — an existing install's renewal schedule is left untouched
#   3. deploys a deploy-hook that restarts the Graylog service after ANY
#      successful renewal, so a renewed cert on disk is never left unused
#      by a still-running process still serving the old one (the deploy-
#      hook path itself, /etc/letsencrypt/renewal-hooks/deploy/, is a
#      certbot-wide convention independent of how certbot was installed)

- name: Check whether certbot is already installed
  ansible.builtin.command: command -v certbot
  register: graylog_cert_renewal_certbot_present
  changed_when: false
  failed_when: false

- name: Install certbot via apt (only if missing)
  ansible.builtin.apt:
    name: certbot
    state: present
    update_cache: true
  when: graylog_cert_renewal_certbot_present.rc != 0

- name: Enable and start certbot's systemd timer (fresh install only)
  ansible.builtin.systemd:
    name: certbot.timer
    enabled: true
    state: started
  when: graylog_cert_renewal_certbot_present.rc != 0

- name: Ensure certbot deploy-hooks directory exists
  ansible.builtin.file:
    path: /etc/letsencrypt/renewal-hooks/deploy
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy the post-renewal Graylog restart hook
  ansible.builtin.template:
    src: "{{ graylog_cert_renewal_templates_dir }}/restart-graylog.sh.j2"
    dest: /etc/letsencrypt/renewal-hooks/deploy/restart-graylog.sh
    owner: root
    group: root
    mode: "0755"

# ---------------------------------------------------------------------------
# kubernetes-opentelemetry input: REST push, not a service restart
# ---------------------------------------------------------------------------
# This input (org.graylog.inputs.otel.OTelGrpcInput) stores its TLS cert/key
# as literal config content, not a filesystem path -- restarting
# graylog-server (above) does nothing for it. See playbook.yml's header
# comment for the full explanation, including why the API token below is
# written to disk instead of only ever living in a live Ansible run.

- name: Install jq (used by the OTel-input push hook to edit its JSON body)
  ansible.builtin.apt:
    name: jq
    state: present

- name: Ensure directory for the Graylog API token file exists
  ansible.builtin.file:
    path: "{{ graylog_cert_renewal_api_token_file | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Write the Graylog API token for the push hook to read at renewal time
  ansible.builtin.copy:
    content: "{{ graylog_cert_renewal_api_token }}"
    dest: "{{ graylog_cert_renewal_api_token_file }}"
    owner: root
    group: root
    mode: "0600"

- name: Deploy the post-renewal Graylog OTel-input REST push hook
  ansible.builtin.template:
    src: "{{ graylog_cert_renewal_templates_dir }}/push-cert-to-graylog.sh.j2"
    dest: /etc/letsencrypt/renewal-hooks/deploy/push-cert-to-graylog.sh
    owner: root
    group: root
    mode: "0755"
