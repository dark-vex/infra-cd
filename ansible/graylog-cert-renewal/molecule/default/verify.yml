---
- name: Verify graylog-cert-renewal installation
  hosts: all
  become: true
  gather_facts: false

  tasks:
    - name: Check certbot package is installed
      ansible.builtin.package_facts:
        manager: apt

    - name: Assert certbot package is installed
      ansible.builtin.assert:
        that: "'certbot' in ansible_facts.packages"
        fail_msg: "certbot package is not installed"

    - name: Check certbot.timer is enabled
      ansible.builtin.systemd:
        name: certbot.timer
      register: certbot_timer_info

    - name: Assert certbot.timer is enabled
      ansible.builtin.assert:
        that: certbot_timer_info.status.UnitFileState == "enabled"
        fail_msg: "certbot.timer is not enabled (state: {{ certbot_timer_info.status.UnitFileState }})"

    - name: Check deploy-hooks directory exists
      ansible.builtin.stat:
        path: /etc/letsencrypt/renewal-hooks/deploy
      register: hooks_dir

    - name: Assert deploy-hooks directory is present
      ansible.builtin.assert:
        that: hooks_dir.stat.isdir
        fail_msg: "/etc/letsencrypt/renewal-hooks/deploy directory not found"

    - name: Check restart-graylog.sh hook exists
      ansible.builtin.stat:
        path: /etc/letsencrypt/renewal-hooks/deploy/restart-graylog.sh
      register: hook_script

    - name: Assert restart-graylog.sh is present and executable
      ansible.builtin.assert:
        that:
          - hook_script.stat.exists
          - hook_script.stat.mode == "0755"
        fail_msg: "restart-graylog.sh hook missing or wrong permissions"

    - name: Check hook script references the graylog service
      ansible.builtin.command:
        cmd: grep -q 'systemctl restart "graylog-server"' /etc/letsencrypt/renewal-hooks/deploy/restart-graylog.sh
      changed_when: false

    - name: Check jq is installed
      ansible.builtin.package_facts:
        manager: apt

    - name: Assert jq package is installed
      ansible.builtin.assert:
        that: "'jq' in ansible_facts.packages"
        fail_msg: "jq package is not installed"

    - name: Check Graylog API token file exists
      ansible.builtin.stat:
        path: /etc/graylog/graylog-cert-push.token
      register: token_file

    - name: Assert Graylog API token file is present with 0600 perms
      ansible.builtin.assert:
        that:
          - token_file.stat.exists
          - token_file.stat.mode == "0600"
        fail_msg: "Graylog API token file missing or wrong permissions"

    - name: Check push-cert-to-graylog.sh hook exists
      ansible.builtin.stat:
        path: /etc/letsencrypt/renewal-hooks/deploy/push-cert-to-graylog.sh
      register: push_hook_script

    - name: Assert push-cert-to-graylog.sh is present and executable
      ansible.builtin.assert:
        that:
          - push_hook_script.stat.exists
          - push_hook_script.stat.mode == "0755"
        fail_msg: "push-cert-to-graylog.sh hook missing or wrong permissions"

    - name: Check push hook has the correct input ID and REST endpoints
      ansible.builtin.command:
        cmd: >-
          grep -q 'GRAYLOG_INPUT_ID="69cfe30fdcfb7e2abf18f3d2"'
          /etc/letsencrypt/renewal-hooks/deploy/push-cert-to-graylog.sh
      changed_when: false

    - name: Check push hook targets the inputstates stop/start endpoints
      ansible.builtin.command:
        cmd: >-
          grep -q '/system/inputstates/${GRAYLOG_INPUT_ID}'
          /etc/letsencrypt/renewal-hooks/deploy/push-cert-to-graylog.sh
      changed_when: false
