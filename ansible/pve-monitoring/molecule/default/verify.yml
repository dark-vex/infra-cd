---
- name: Verify pve-monitoring installation
  hosts: all
  become: true
  gather_facts: false

  tasks:
    # -------------------------------------------------------------------------
    # prometheus-pve-exporter
    # -------------------------------------------------------------------------

    - name: Check pve-exporter system user exists
      ansible.builtin.command: id pve-exporter
      changed_when: false

    - name: Check pve-exporter config directory exists
      ansible.builtin.stat:
        path: /etc/prometheus-pve-exporter
      register: pve_config_dir

    - name: Assert pve-exporter config directory is present
      ansible.builtin.assert:
        that: pve_config_dir.stat.isdir
        fail_msg: "/etc/prometheus-pve-exporter directory not found"

    - name: Check pve.yml config file exists
      ansible.builtin.stat:
        path: /etc/prometheus-pve-exporter/pve.yml
      register: pve_config_file

    - name: Assert pve.yml is present
      ansible.builtin.assert:
        that: pve_config_file.stat.exists
        fail_msg: "/etc/prometheus-pve-exporter/pve.yml not found"

    - name: Assert pve.yml has correct permissions (0600)
      ansible.builtin.assert:
        that: pve_config_file.stat.mode == "0600"
        fail_msg: "pve.yml permissions should be 0600, got {{ pve_config_file.stat.mode }}"

    - name: Check pve-exporter systemd unit file exists
      ansible.builtin.stat:
        path: /etc/systemd/system/pve-exporter.service
      register: pve_unit

    - name: Assert pve-exporter.service unit file is present
      ansible.builtin.assert:
        that: pve_unit.stat.exists
        fail_msg: "/etc/systemd/system/pve-exporter.service not found"

    - name: Check prometheus-pve-exporter pip package is installed
      ansible.builtin.command: pip3 show prometheus-pve-exporter
      changed_when: false

    # -------------------------------------------------------------------------
    # Grafana Alloy
    # -------------------------------------------------------------------------

    - name: Check Grafana GPG keyring exists
      ansible.builtin.stat:
        path: /usr/share/keyrings/grafana.gpg
      register: grafana_gpg

    - name: Assert Grafana GPG keyring is present
      ansible.builtin.assert:
        that: grafana_gpg.stat.exists
        fail_msg: "Grafana GPG keyring not found at /usr/share/keyrings/grafana.gpg"

    - name: Check alloy package is installed
      ansible.builtin.package_facts:
        manager: apt

    - name: Assert alloy package is installed
      ansible.builtin.assert:
        that: "'alloy' in ansible_facts.packages"
        fail_msg: "alloy package is not installed"

    - name: Check Alloy config directory exists
      ansible.builtin.stat:
        path: /etc/alloy
      register: alloy_config_dir

    - name: Assert Alloy config directory is present
      ansible.builtin.assert:
        that: alloy_config_dir.stat.isdir
        fail_msg: "/etc/alloy directory not found"

    - name: Check Alloy config file exists
      ansible.builtin.stat:
        path: /etc/alloy/config.alloy
      register: alloy_config

    - name: Assert Alloy config file is present
      ansible.builtin.assert:
        that: alloy_config.stat.exists
        fail_msg: "/etc/alloy/config.alloy not found"

    - name: Check Alloy config contains remote_write URL
      ansible.builtin.command:
        cmd: grep -q "prometheus-prod-01.grafana.net" /etc/alloy/config.alloy
      changed_when: false
      failed_when: false
      register: alloy_url_check

    - name: Assert remote_write URL is in Alloy config
      ansible.builtin.assert:
        that: alloy_url_check.rc == 0
        fail_msg: "Expected grafana_prometheus_url not found in /etc/alloy/config.alloy"

    - name: Check /etc/default/alloy has CUSTOM_ARGS set
      ansible.builtin.command:
        cmd: grep -q "CUSTOM_ARGS=" /etc/default/alloy
      changed_when: false

    - name: Check pve-exporter service is enabled
      ansible.builtin.systemd:
        name: pve-exporter
      register: pve_service_info

    - name: Assert pve-exporter service is enabled
      ansible.builtin.assert:
        that: pve_service_info.status.UnitFileState == "enabled"
        fail_msg: "pve-exporter service is not enabled (state: {{ pve_service_info.status.UnitFileState }})"

    - name: Check alloy service is enabled
      ansible.builtin.systemd:
        name: alloy
      register: alloy_service_info

    - name: Assert alloy service is enabled
      ansible.builtin.assert:
        that: alloy_service_info.status.UnitFileState == "enabled"
        fail_msg: "alloy service is not enabled (state: {{ alloy_service_info.status.UnitFileState }})"
