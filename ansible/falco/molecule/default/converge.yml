---
# Molecule converge wrapper: runs the falco playbook against the test container.
# Overrides 'hosts' to target molecule's managed nodes and skips the kernel
# version assertion (containers don't expose the host kernel version >= 5.8).
- name: Converge
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Install prerequisites
      ansible.builtin.apt:
        name:
          - gnupg
          - curl
          - apt-transport-https
        state: present
        update_cache: true

    - name: Add Falco GPG key
      ansible.builtin.shell: |
        curl -fsSL https://falco.org/repo/falcosecurity-packages.asc \
          | gpg --dearmor -o /usr/share/keyrings/falco-archive-keyring.gpg
      args:
        creates: /usr/share/keyrings/falco-archive-keyring.gpg

    - name: Add Falco APT repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/falco-archive-keyring.gpg] https://download.falco.org/packages/deb stable main"
        filename: falcosecurity
        state: present

    - name: Install Falco
      ansible.builtin.apt:
        name: falco
        state: latest
        update_cache: true

    - name: Deploy Falco configuration
      ansible.builtin.template:
        src: ../../templates/falco.yaml.j2
        dest: /etc/falco/falco.yaml
        owner: root
        group: root
        mode: '0644'

    - name: Deploy custom rules
      ansible.builtin.copy:
        src: ../../files/falco_rules.local.yaml
        dest: /etc/falco/falco_rules.local.yaml
        owner: root
        group: root
        mode: '0644'
