---
# Rocky Linux 9 (not the Debian image used elsewhere in this repo) since
# the real target — the OCI teleport.ddlns.net box — is confirmed
# RPM/dnf-based via `rpm -qa`, not apt.
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: teleport-server-test
    image: geerlingguy/docker-rockylinux9-ansible:latest
    pre_build_image: true
    privileged: true
    command: /usr/lib/systemd/systemd
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      - /run
      - /tmp
provisioner:
  name: ansible
  playbooks:
    converge: converge.yml
verifier:
  name: ansible
