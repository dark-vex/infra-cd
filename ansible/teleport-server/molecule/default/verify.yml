---
- name: Verify teleport-server installation
  hosts: all
  become: true
  gather_facts: false

  tasks:
    - name: Check Teleport YUM repo file exists
      ansible.builtin.stat:
        path: /etc/yum.repos.d/teleport.repo
      register: teleport_repo

    - name: Assert Teleport YUM repo file is present
      ansible.builtin.assert:
        that: teleport_repo.stat.exists
        fail_msg: "/etc/yum.repos.d/teleport.repo not found"

    - name: Check teleport package is installed
      ansible.builtin.package_facts:
        manager: auto

    - name: Assert teleport package is installed
      ansible.builtin.assert:
        that: "'teleport' in ansible_facts.packages"
        fail_msg: "teleport package is not installed"

    - name: Check /etc/teleport.yaml exists
      ansible.builtin.stat:
        path: /etc/teleport.yaml
      register: teleport_config

    - name: Assert /etc/teleport.yaml is present
      ansible.builtin.assert:
        that: teleport_config.stat.exists
        fail_msg: "/etc/teleport.yaml not found"

    - name: Assert /etc/teleport.yaml has correct permissions (0600)
      ansible.builtin.assert:
        that: teleport_config.stat.mode == "0600"
        fail_msg: "/etc/teleport.yaml permissions should be 0600, got {{ teleport_config.stat.mode }}"

    - name: Check /etc/teleport.yaml contains all four services
      ansible.builtin.command:
        cmd: "grep -q '{{ item }}:' /etc/teleport.yaml"
      loop:
        - auth_service
        - ssh_service
        - proxy_service
        - kubernetes_service
      changed_when: false

    - name: Check teleport service is enabled
      ansible.builtin.systemd:
        name: teleport
      register: teleport_service_info

    - name: Assert teleport service is enabled
      ansible.builtin.assert:
        # Not asserting `active`/`started`: this container can't authenticate
        # to a real Teleport cluster, so the service crash-loops on auth
        # failure — only enablement is a meaningful check here.
        that: teleport_service_info.status.UnitFileState == "enabled"
        fail_msg: "teleport service is not enabled (state: {{ teleport_service_info.status.UnitFileState }})"
