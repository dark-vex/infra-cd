[defaults]
# Enables the community.sops.sops vars plugin so host_vars/*.sops.yaml is
# auto-decrypted (SOPS_AGE_KEY_FILE must be set at run time). host_group_vars
# must stay listed — this replaces, not appends to, the default vars plugin
# list, and dropping it would silently stop plain host_vars/group_vars files
# from loading. Only takes effect when ansible-playbook's cwd is this
# directory; the ansible-agent container sets ANSIBLE_VARS_ENABLED instead,
# which is cwd-independent — see ansible/CLAUDE.md.
vars_plugins_enabled = host_group_vars, community.sops.sops
