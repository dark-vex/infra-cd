---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: teleport-agent
  namespace: teleport
spec:
  interval: 5m
  chart:
    spec:
      chart: teleport-kube-agent
      version: ">=18.0.0"
      sourceRef:
        kind: HelmRepository
        name: teleport-charts
        namespace: flux-system
      interval: 5m
  install:
    createNamespace: true
    remediation:
      retries: 6
  upgrade:
    remediation:
      retries: 6
  # Audit-first: warn only logs/events on drift between the Helm release and
  # live cluster state, it never corrects it - a safe first step before any
  # app is promoted to mode: enabled (which would actively revert manual or
  # external changes).
  driftDetection:
    mode: warn
  values:
    proxyAddr: ${TELEPORT_HOST}:443
    kubeClusterName: "k3s-rabbit"
    joinTokenSecret:
      create: false
      name: "teleport-kube-agent-join-token"
    extraEnv:
    - name: HTTPS_PROXY
      value: "${SQUID_URL}"
    - name: NO_PROXY
      value: "10.43.0.0/24, svc.cluster.local"
