---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: teleport-kube-agent-join-token
  namespace: flux-system
spec:
  dependsOn:
    - name: 1p-operator
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./clusters/k8s-vms-daniele/apps/teleport-agent/secrets
  prune: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: teleport-kube-agent
  namespace: flux-system
spec:
  dependsOn:
    - name: teleport-kube-agent-join-token
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./clusters/k8s-vms-daniele/apps/teleport-agent/manifests
  prune: true
  patches:
    - target:
        kind: HelmRelease
        name: teleport-agent
      patch: |
        - op: replace
          path: /spec/values/kubeClusterName
          value: k3s-prod-test
