---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: grafana-alloy-secrets
  namespace: flux-system
spec:
  dependsOn:
    - name: 1p-operator
  targetNamespace: grafana-alloy
  interval: 15m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./clusters/k8s-vms-daniele/apps/grafana-alloy/secrets
  prune: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: grafana-alloy
  namespace: flux-system
spec:
  dependsOn:
    - name: grafana-alloy-secrets
  targetNamespace: grafana-alloy
  interval: 15m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./clusters/k8s-vms-daniele/apps/grafana-alloy/manifests
  prune: true
  patches:
    - target:
        kind: HelmRelease
        name: grafana-k8s-monitoring
      patch: |
        - op: replace
          path: /spec/values/cluster/name
          value: k3s-prod-test
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: grafana-k8s-monitoring
      namespace: grafana-alloy
