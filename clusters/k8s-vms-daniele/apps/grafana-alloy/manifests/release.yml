---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana-k8s-monitoring
  namespace: grafana-alloy
spec:
  interval: 15m
  timeout: 10m
  maxHistory: 20
  chart:
    spec:
      chart: k8s-monitoring
      version: "3.x.x"
      sourceRef:
        kind: HelmRepository
        name: grafana-charts
        namespace: flux-system
      interval: 15m
  install:
    createNamespace: true
    remediation:
      retries: 6
  upgrade:
    remediation:
      retries: 6
  valuesFrom:
    # --- Destination passwords ---
    - kind: Secret
      name: grafana-cloud-credentials
      valuesKey: password
      targetPath: destinations[0].auth.password
    - kind: Secret
      name: grafana-cloud-credentials
      valuesKey: password
      targetPath: destinations[1].auth.password
    # --- Destination usernames ---
    - kind: Secret
      name: grafana-cloud-credentials
      valuesKey: metrics-username
      targetPath: destinations[0].auth.username
    - kind: Secret
      name: grafana-cloud-credentials
      valuesKey: logs-username
      targetPath: destinations[1].auth.username
  values:
    cluster:
      name: k8s-vms-daniele

    # Lightweight: metrics + logs only (no OTLP/traces)
    destinations:
      - name: grafana-cloud-metrics
        type: prometheus
        url: ${GRAFANA_PROMETHEUS_URL}
        auth:
          type: basic
        metricProcessingRules: |
          write_relabel_config {
            source_labels = ["__name__"]
            regex         = "(alloy|prometheus_remote_storage|prometheus_target|prometheus_sd|scrape|otelcol|receiver|exporter|cluster|go|process|gotk)_.*|up|scrape_.*"
            action        = "drop"
          }
      - name: grafana-cloud-logs
        type: loki
        url: ${GRAFANA_LOKI_URL}
        auth:
          type: basic

    selfReporting:
      enabled: false

    clusterMetrics:
      enabled: true
      kepler:
        enabled: false
      kubelet:
        enabled: false
      cadvisor:
        enabled: false
      apiServer:
        enabled: false
      kubeControllerManager:
        enabled: false
      kubeScheduler:
        enabled: false
      kubeProxy:
        enabled: false
      kubeDNS:
        enabled: false
      node-exporter:
        enabled: false
        deploy: false
      opencost:
        enabled: false
      windows-exporter:
        enabled: false
        deploy: false

    annotationAutodiscovery:
      enabled: true
      annotations:
        scrape: "prometheus.io/scrape"
        metricsPortNumber: "prometheus.io/port"
        metricsPath: "prometheus.io/path"
        metricsScheme: "prometheus.io/scheme"
      destinations:
        - grafana-cloud-metrics

    clusterEvents:
      enabled: true

    podLogs:
      enabled: true

    applicationObservability:
      enabled: false

    alloy-metrics:
      enabled: true
      remoteConfig:
        enabled: false

    alloy-singleton:
      enabled: true
      remoteConfig:
        enabled: false

    alloy-logs:
      enabled: true
      remoteConfig:
        enabled: false
      alloy:
        extraConfig: |
          loki.process "filter_logs" {
            // Drop debug logs
            stage.drop {
              expression          = ".*level=debug.*"
              drop_counter_reason = "debug_noise"
            }
            // Drop info-level logs (keep only warn/error/fatal)
            stage.drop {
              expression          = ".*level=info.*"
              drop_counter_reason = "info_noise"
            }
            // Drop health checks
            stage.drop {
              expression          = ".*(healthcheck|readiness|liveness|health_check|/healthz|/readyz|/livez).*"
              drop_counter_reason = "probe_noise"
            }
            // Drop Flux reconciliation success noise
            stage.drop {
              expression          = ".*Reconciliation finished.*"
              drop_counter_reason = "flux_reconcile_noise"
            }
            // Drop HTTP 2xx/3xx access logs
            stage.drop {
              expression          = ".*\" (2[0-9]{2}|3[0-9]{2}) .*"
              drop_counter_reason = "success_access_logs"
            }
            stage.drop {
              expression          = ".*\\[WARNING\\] No files matching import glob pattern.*"
              drop_counter_reason = "coredns_noise"
            }
            forward_to = [loki.write.default.receiver]
          }

    alloy-receiver:
      enabled: false
