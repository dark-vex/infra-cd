---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana-k8s-monitoring
  namespace: grafana-alloy
spec:
  interval: 15m
  timeout: 10m
  maxHistory: 20
  chart:
    spec:
      chart: k8s-monitoring
      version: "4.x"
      sourceRef:
        kind: HelmRepository
        name: grafana-charts
        namespace: flux-system
      interval: 15m
  install:
    createNamespace: true
    remediation:
      retries: 6
  upgrade:
    remediation:
      retries: 6
  # Audit-first: warn only logs/events on drift between the Helm release and
  # live cluster state, it never corrects it - a safe first step before any
  # app is promoted to mode: enabled (which would actively revert manual or
  # external changes).
  driftDetection:
    mode: warn
  valuesFrom:
    # --- Destination passwords ---
    - kind: Secret
      name: grafana-cloud-credentials
      valuesKey: password
      targetPath: destinations.grafanaCloudMetrics.auth.password
    - kind: Secret
      name: grafana-cloud-credentials
      valuesKey: password
      targetPath: destinations.grafanaCloudLogs.auth.password
    # --- Destination usernames ---
    - kind: Secret
      name: grafana-cloud-credentials
      valuesKey: metrics-username
      targetPath: destinations.grafanaCloudMetrics.auth.username
    - kind: Secret
      name: grafana-cloud-credentials
      valuesKey: logs-username
      targetPath: destinations.grafanaCloudLogs.auth.username
  values:
    cluster:
      name: k8s-vms-daniele

    global:
      podSecurityContext:
        runAsNonRoot: true
        runAsUser: 65532

    # Settings applied to all Alloy instances (metrics, singleton, logs)
    collectorCommon:
      alloy:
        alloy:
          # capabilities intentionally left at chart defaults (drop ALL + a
          # documented add-list) - alloy-logs needs DAC_OVERRIDE/CHOWN/FOWNER
          # etc. to read host log files owned by other UIDs; zeroing the
          # add-list here would break that collector
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
          # Conservative documented estimate (not sized from live usage - no
          # Grafana access this session), applied uniformly to all collector
          # instances even though alloy-singleton is lighter than
          # alloy-metrics/-logs - flagged for a follow-up tune with
          # per-collector overrides once real usage data is available.
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
          mounts:
            extra:
              - name: alloy-data
                mountPath: /tmp/alloy
        controller:
          volumes:
            extra:
              - name: alloy-data
                emptyDir: {}

    # Lightweight: metrics + logs only (no OTLP/traces)
    destinations:
      grafanaCloudMetrics:
        type: prometheus
        url: ${GRAFANA_PROMETHEUS_URL}
        auth:
          type: basic
        metricProcessingRules: |
          write_relabel_config {
            source_labels = ["__name__"]
            regex         = "(alloy|prometheus_remote_storage|prometheus_target|prometheus_sd|scrape|otelcol|receiver|exporter|cluster|go|process|gotk)_.*|up|scrape_.*"
            action        = "drop"
          }
          write_relabel_config {
            source_labels = ["__name__"]
            regex         = "kube_(endpoint|endpointslice|lease|replicationcontroller|limitrange|resourcequota|certificatesigningrequest|mutatingwebhookconfiguration|validatingwebhookconfiguration|storageclass|csinode|csistoragecapacity|priorityclass|ingressclass|networkpolicy|poddisruptionbudget|configmap|serviceaccount|role|rolebinding|clusterrole|clusterrolebinding)_.*"
            action        = "drop"
          }
          write_relabel_config {
            source_labels = ["job"]
            regex         = "prometheus-node-exporter"
            action        = "drop"
          }
          write_relabel_config {
            source_labels = ["__name__"]
            regex         = "pg_locks_count|pg_stat_activity_count|pg_stat_activity_max_tx_duration"
            action        = "drop"
          }
          write_relabel_config {
            source_labels = ["__name__"]
            regex         = "pg_stat_database_(conflicts.*|tup_.*|blk_(read|write)_time|temp_.*|active_time.*)"
            action        = "drop"
          }
          write_relabel_config {
            source_labels = ["__name__"]
            regex         = "(controller_runtime_reconcile_time_seconds|workqueue_queue_duration_seconds|workqueue_work_duration_seconds)_bucket"
            action        = "drop"
          }
      grafanaCloudLogs:
        type: loki
        url: ${GRAFANA_LOKI_URL}
        auth:
          type: basic
        logProcessingStages: |
          stage.regex {
            expression = "(?i)(?:\"(?:level|lvl|severity)\"\\s*:\\s*\"|(?:^|\\s)(?:level|lvl|severity)=)(?P<level>debug|info|warn(?:ing)?|error|fatal|critical)"
          }
          stage.labels {
            values = { level = "" }
          }
          stage.regex {
            expression = "(?i)\\[(?P<level>warn(?:ing)?|notice|err(?:or)?|info|debug|fatal|critical)\\]"
          }
          stage.labels {
            values = { level = "" }
          }
          stage.match {
            selector = `{level=~"(?i)debug|trace"}`
            action   = "drop"
            drop_counter_reason = "gc_loki_debug_trace"
          }
          stage.match {
            selector = `{level!~"(?i)warn(ing)?|notice|error|fatal|critical"}`
            action   = "drop"
            drop_counter_reason = "gc_loki_default_deny"
          }

    selfReporting:
      enabled: false

    telemetryServices:
      kube-state-metrics:
        deploy: true
        securityContext:
          runAsUser: 65532
          runAsGroup: 65532
          fsGroup: 65532
        containerSecurityContext:
          runAsUser: 65532
        resources:
          requests:
            cpu: 20m
            memory: 64Mi
          limits:
            memory: 128Mi

    clusterMetrics:
      enabled: true
      collector: alloy-metrics
      destinations:
        - grafanaCloudMetrics
      kubelet:
        enabled: false
      cadvisor:
        enabled: false
      apiServer:
        enabled: false
      kubeControllerManager:
        enabled: false
      kubeScheduler:
        enabled: false
      kubeProxy:
        enabled: false
      kubeDNS:
        enabled: false
      kube-state-metrics:
        metricsTuning:
          excludeMetrics:
            # Replicaset noise
            - kube_replicaset_status_observed_generation
            - kube_replicaset_status_fully_labeled_replicas
            - kube_replicaset_owner
            - kube_replicaset_spec_replicas
            - kube_replicaset_status_replicas
            - kube_replicaset_status_ready_replicas
            # High-churn resource lifecycle metadata (regex — covers all resource types)
            - kube_.*_created
            - kube_.*_metadata_generation
            - kube_pod_status_qos_class
            # Pod/deployment noise
            - kube_pod_status_reason
            - kube_secret_metadata_resource_version
            - kube_deployment_status_condition
            # Init container metrics (rarely needed for basic monitoring)
            - kube_pod_init_container_info
            - kube_pod_init_container_resource_limits
            - kube_pod_init_container_resource_requests
            - kube_pod_init_container_status_last_terminated_exitcode
            - kube_pod_init_container_status_last_terminated_reason
            - kube_pod_init_container_status_ready
            - kube_pod_init_container_status_restarts_total
            - kube_pod_init_container_status_running
            - kube_pod_init_container_status_terminated
            - kube_pod_init_container_status_terminated_reason
            - kube_pod_init_container_status_waiting
            - kube_pod_init_container_status_waiting_reason
            # Pod scheduling metadata
            - kube_pod_overhead_cpu_cores
            - kube_pod_overhead_memory_bytes
            - kube_pod_nodeselectors
            - kube_pod_tolerations
            - kube_pod_spec_volumes_persistentvolumeclaims_info
            - kube_pod_spec_volumes_persistentvolumeclaims_readonly
            # Container last-terminated detail
            - kube_pod_container_status_last_terminated_exitcode
            - kube_pod_container_status_last_terminated_reason

    annotationAutodiscovery:
      enabled: true
      collector: alloy-metrics
      annotations:
        scrape: "prometheus.io/scrape"
        metricsPortNumber: "prometheus.io/port"
        metricsPath: "prometheus.io/path"
        metricsScheme: "prometheus.io/scheme"
      destinations:
        - grafanaCloudMetrics

    clusterEvents:
      enabled: true
      collector: alloy-singleton
      destinations:
        - grafanaCloudLogs

    podLogsViaLoki:
      enabled: true
      collector: alloy-logs
      destinations:
        - grafanaCloudLogs
      extraLogProcessingStages: |
        stage.drop {
          expression          = ".*level=debug.*"
          drop_counter_reason = "debug_noise"
        }
        stage.drop {
          expression          = ".*level=info.*"
          drop_counter_reason = "info_noise"
        }
        stage.drop {
          expression          = ".*(healthcheck|readiness|liveness|health_check|/healthz|/readyz|/livez).*"
          drop_counter_reason = "probe_noise"
        }
        stage.drop {
          expression          = ".*Reconciliation finished.*"
          drop_counter_reason = "flux_noise"
        }
        stage.drop {
          expression          = ".*\" (2[0-9]{2}|3[0-9]{2}) .*"
          drop_counter_reason = "success_access_logs"
        }
        stage.drop {
          expression          = ".*\\[WARNING\\] No files matching import glob pattern.*"
          drop_counter_reason = "coredns_noise"
        }

    applicationObservability:
      enabled: false

    collectors:
      alloy-metrics:
        presets:
          - clustered
          - statefulset
        alloy:
          extraEnv:
            - name: CLUSTER_NAME
              value: k8s-vms-daniele
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
        remoteConfig:
          enabled: false

      alloy-singleton:
        presets:
          - singleton
        alloy:
          extraEnv:
            - name: CLUSTER_NAME
              value: k8s-vms-daniele
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
        remoteConfig:
          enabled: false

      alloy-logs:
        presets:
          - daemonset
          - filesystem-log-reader
        alloy:
          extraEnv:
            - name: CLUSTER_NAME
              value: k8s-vms-daniele
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
        remoteConfig:
          enabled: false
