---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: falco
  namespace: falco
spec:
  interval: 15m
  timeout: 10m
  maxHistory: 20
  chart:
    spec:
      chart: falco
      version: "9.x"
      sourceRef:
        kind: HelmRepository
        name: falcosecurity-charts
        namespace: flux-system
      interval: 15m
  install:
    createNamespace: true
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  # Audit-first: warn only logs/events on drift between the Helm release and
  # live cluster state, it never corrects it - a safe first step before any
  # app is promoted to mode: enabled (which would actively revert manual or
  # external changes).
  driftDetection:
    mode: warn
  valuesFrom:
    - kind: Secret
      name: falcosidekick-credentials
      valuesKey: slack-webhook-url
      targetPath: falcosidekick.config.slack.webhookurl
    - kind: Secret
      name: falcosidekick-credentials
      valuesKey: loki-username
      targetPath: falcosidekick.config.loki.user
    - kind: Secret
      name: falcosidekick-credentials
      valuesKey: loki-password
      targetPath: falcosidekick.config.loki.apikey
  values:
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: null
        memory: 1024Mi
    driver:
      kind: modern_ebpf

    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule

    falcoctl:
      artifact:
        install:
          enabled: true
        follow:
          enabled: true
      config:
        artifact:
          install:
            refs:
              - falco-rules:5
              - falco-sandbox-rules:5
          follow:
            refs:
              - falco-rules:5
              - falco-sandbox-rules:5

    falco:
      json_output: true
      json_include_output_property: true
      json_include_tags_property: true
      log_stderr: true
      log_syslog: false
      rules_files:
        - /etc/falco/falco_rules.yaml
        - /etc/falco/falco_rules.local.yaml
        - /etc/falco/rules.d

    falcosidekick:
      enabled: true
      replicaCount: 1
      # Conservative documented estimate (not sized from live usage - no
      # Grafana access this session); lightweight event-relay component
      resources:
        requests:
          cpu: 20m
          memory: 32Mi
        limits:
          memory: 128Mi
      config:
        customfields: "cluster:k8s-vms-daniele,service_name:falco"
        loki:
          hostport: "${GRAFANA_LOKI_HOST}"
          endpoint: "/loki/api/v1/push"
        slack:
          minimumpriority: "warning"
