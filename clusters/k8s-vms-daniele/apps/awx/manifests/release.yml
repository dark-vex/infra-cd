---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ansible-awx
  namespace: awx
spec:
  interval: 5m
  chart:
    spec:
      chart: awx-operator
      version: ">=3.1.0"
      sourceRef:
        kind: HelmRepository
        name: awx-chart
        namespace: flux-system
      interval: 5m
  install:
    createNamespace: true
    crds: CreateReplace
    remediation:
      retries: 10
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 10
  # Audit-first: warn only logs/events on drift between the Helm release and
  # live cluster state, it never corrects it - a safe first step before any
  # app is promoted to mode: enabled (which would actively revert manual or
  # external changes).
  driftDetection:
    mode: warn
  values:
    AWX:
      enabled: true
      name: awx
      spec:
        ingress_type: ingress
        ingress_class_name: traefik
        hostname: ${AWX_HOST}
        ingress_annotations: |
          external-dns.alpha.kubernetes.io/managed-by: external-dns
          external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
          external-dns.alpha.kubernetes.io/target: ${CLOUDFLARE_TUNNEL_TARGET}
        secret_key_secret: custom-awx-secret-key
        projects_persistence: true
        projects_storage_class: local-path
        projects_storage_size: 8Gi
        projects_storage_access_mode: ReadWriteOnce
        extra_settings:
        - setting: CSRF_TRUSTED_ORIGINS
          value:
          - https://localhost:3001
          - https://${AWX_HOST}
        web_resource_requirements:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 2Gi
        task_resource_requirements:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 300m
            memory: 2Gi
        ee_resource_requirements:
          requests:
            cpu: 200m
            memory: 128Mi
          limits:
            cpu: 300m
            memory: 256Mi
