---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: external-dns
spec:
  interval: 15m
  maxHistory: 20
  chart:
    spec:
      chart: external-dns
      version: "1.21.1"
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: flux-system
      interval: 15m
  install:
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  values:
    # CF_API_TOKEN below is only read at container startup - without this,
    # rotating the 1Password-synced cloudflare-api-token secret never
    # restarts the pod (Reloader watches the Secret referenced in env,
    # scoped to secrets only so a config-only chart bump doesn't also
    # trigger a redundant restart).
    podAnnotations:
      secret.reloader.stakater.com/auto: "true"
    # Conservative documented estimate (not sized from live usage - no
    # Grafana access this session), generous headroom since this instance
    # currently manages zero records (annotationFilter opt-in gate above).
    # Flagged for a follow-up tune once real usage data is available.
    resources:
      requests:
        cpu: 20m
        memory: 32Mi
      limits:
        memory: 128Mi
    provider:
      name: cloudflare
    sources:
      - ingress
    policy: upsert-only
    registry: txt
    # Permanent for the life of this deployment - changing it orphans every
    # record this instance owns. Do not change.
    txtOwnerId: k8s-vms-daniele
    txtPrefix: "extdns-"
    domainFilters:
      - ddlns.net
      - fastnetserv.net
    # Opt-in gate: no Ingress is annotated yet, so this instance manages
    # zero records until a host is verified and explicitly opted in
    # (see runbook). Every current app host is fronted by the Cloudflare
    # Tunnel, not the ingress LB, so adoption also requires a per-Ingress
    # `external-dns.alpha.kubernetes.io/target` annotation - never adopt
    # from bare ingress status.
    annotationFilter: "external-dns.alpha.kubernetes.io/managed-by=external-dns"
    extraArgs:
      cloudflare-dns-records-per-page: "100"
    env:
      - name: CF_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: external-dns-cloudflare
            key: api-token
