---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 1password-secrets
  namespace: flux-system
spec:
  targetNamespace: 1password
  interval: 15m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./clusters/k8s-vms-daniele/apps/1password/secrets
  prune: true
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 1p-operator
  namespace: flux-system
spec:
  targetNamespace: 1password
  path: ./clusters/k8s-vms-daniele/apps/1password/manifests
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  interval: 15m
  dependsOn:
    - name: 1password-secrets
