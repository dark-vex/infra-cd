---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-webhook-secrets
  namespace: flux-system
spec:
  dependsOn:
    - name: 1p-operator
  path: ./clusters/k8s-vms-daniele/apps/flux-webhook/secrets
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  interval: 15m
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-webhook
  namespace: flux-system
spec:
  dependsOn:
    - name: flux-webhook-secrets
  path: ./clusters/k8s-vms-daniele/apps/flux-webhook/manifests
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  interval: 15m
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-vars
