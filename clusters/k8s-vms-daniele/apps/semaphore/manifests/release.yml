---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: semaphore
  namespace: semaphore
spec:
  interval: 15m
  maxHistory: 10
  chart:
    spec:
      chart: semaphore
      version: ">=1.0.0"
      sourceRef:
        kind: HelmRepository
        name: semaphoreui
        namespace: flux-system
      interval: 1h
  install:
    createNamespace: true
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  # Audit-first: warn only logs/events on drift between the Helm release and
  # live cluster state, it never corrects it - a safe first step before any
  # app is promoted to mode: enabled (which would actively revert manual or
  # external changes).
  driftDetection:
    mode: warn
  # Credentials injected from 1Password via semaphore-credentials secret.
  # The secret must contain:
  #   admin-username  - Initial admin username
  #   admin-password  - Initial admin password
  #   admin-email     - Admin email address
  #   access-key      - Random 32-char string used as encryption key
  #
  # db-host/db-name/db-user/db-password used to live in this secret too, but
  # are now unused/stale - Semaphore has its own dedicated CNPG Postgres
  # (see ../semaphore-db). database.host/database.name are literal values
  # below (not sensitive - the CNPG service name and db name are known once
  # the Cluster is named); db-user/db-password now come from the
  # CNPG-generated semaphore-db-app secret instead.
  valuesFrom:
    - kind: Secret
      name: semaphore-credentials
      valuesKey: admin-username
      targetPath: auth.admin.username
    - kind: Secret
      name: semaphore-credentials
      valuesKey: admin-password
      targetPath: auth.admin.password
    - kind: Secret
      name: semaphore-credentials
      valuesKey: admin-email
      targetPath: auth.admin.email
    - kind: Secret
      name: semaphore-db-app
      valuesKey: username
      targetPath: database.username
    - kind: Secret
      name: semaphore-db-app
      valuesKey: password
      targetPath: database.password
    - kind: Secret
      name: semaphore-credentials
      valuesKey: access-key
      targetPath: semaphore.accessKey
  values:
    # Note: this chart's key names are inverted from the usual convention -
    # `securityContext` renders at pod level, `podSecurityContext` renders
    # at container level (verified via helm template). readOnlyRootFilesystem
    # and a forced UID are intentionally left out: ansible/terraform tool
    # caches invoked by Semaphore jobs may write to $HOME (no HOME env is set
    # by the chart), and the existing workdir PVC data is owned by whatever
    # UID the pod ran as before - no live cluster to verify either is safe
    podSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL

    database:
      type: postgres
      # Not sensitive - CNPG's generated -rw service name and the bootstrap
      # database name, both known once the Cluster is named. See
      # ../semaphore-db/manifests/cluster.yml.
      host: semaphore-db-rw.semaphore.svc.cluster.local
      name: semaphore

    ingress:
      enabled: true
      className: traefik
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt"
        # Opt-in to external-dns (see the External DNS runbook). No public
        # DNS record for SEMAPHORE_HOST exists today (confirmed via dig
        # against multiple resolvers) despite this Ingress running for
        # weeks - creates a new record rather than adopting an existing
        # one. proxied:"true" to match every other app host in this
        # migration. Tunnel target comes from cluster-vars (never hardcode
        # FQDNs/tunnel targets in git).
        external-dns.alpha.kubernetes.io/managed-by: external-dns
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
        external-dns.alpha.kubernetes.io/target: ${CLOUDFLARE_TUNNEL_TARGET}
      hosts:
        - host: ${SEMAPHORE_HOST}
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: semaphore-tls
          hosts:
            - ${SEMAPHORE_HOST}

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
