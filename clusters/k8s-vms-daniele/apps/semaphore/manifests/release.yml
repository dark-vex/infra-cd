---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: semaphore
  namespace: semaphore
spec:
  interval: 15m
  maxHistory: 10
  chart:
    spec:
      chart: semaphore
      version: ">=1.0.0"
      sourceRef:
        kind: HelmRepository
        name: semaphoreui
        namespace: flux-system
      interval: 1h
  install:
    createNamespace: true
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  # Audit-first: warn only logs/events on drift between the Helm release and
  # live cluster state, it never corrects it - a safe first step before any
  # app is promoted to mode: enabled (which would actively revert manual or
  # external changes).
  driftDetection:
    mode: warn
  valuesFrom:
    - kind: Secret
      name: semaphore-credentials
      valuesKey: admin-username
      targetPath: admin.username
    - kind: Secret
      name: semaphore-credentials
      valuesKey: admin-password
      targetPath: admin.password
    - kind: Secret
      name: semaphore-credentials
      valuesKey: admin-email
      targetPath: admin.email
    - kind: Secret
      name: semaphore-db-app
      valuesKey: username
      targetPath: database.username
    - kind: Secret
      name: semaphore-db-app
      valuesKey: password
      targetPath: database.password
  values:
    admin:
      create: true

    podSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL

    database:
      type: postgres
      host: semaphore-db-rw.semaphore.svc.cluster.local
      name: semaphore

    ingress:
      enabled: true
      className: traefik
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt"
        external-dns.alpha.kubernetes.io/managed-by: external-dns
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
        external-dns.alpha.kubernetes.io/target: ${CLOUDFLARE_TUNNEL_TARGET}
      hosts:
        - host: ${SEMAPHORE_HOST}
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: semaphore-tls
          hosts:
            - ${SEMAPHORE_HOST}

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
