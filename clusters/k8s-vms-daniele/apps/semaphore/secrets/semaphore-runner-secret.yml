---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: semaphore-runner-sops-age-key
  namespace: semaphore
spec:
  # Create this item in 1Password with one field:
  #   private-key  - the SAME age private key already used locally for
  #                   `ansible/*/host_vars/*.sops.yaml` (public recipient
  #                   age13h7kx5mcfa0yn4mpf6udw39nup0sl4402mmemra9yfkymmscqd7s9grug2,
  #                   see .sops.yaml and ansible/CLAUDE.md) - do NOT generate
  #                   a new keypair, this one has to decrypt the same files.
  #                   Mounted into the runner pod as SOPS_AGE_KEY_FILE.
  #
  # Blast radius: this puts the private key on the semaphore namespace,
  # which can then decrypt every ansible/*/host_vars/*.sops.yaml file, not
  # just the ones a given task actually needs.
  itemPath: "vaults/k8s_secrets/items/semaphore-runner-sops-age-key_k8s-vms-daniele"
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: semaphore-runner-op-connect
  namespace: semaphore
spec:
  # Create this item in 1Password with one field:
  #   token  - a NEW, freshly minted, vault-scoped 1Password Connect token
  #            (do not reuse the local ansible-agent's OP_CONNECT_TOKEN).
  #            Talks to this cluster's own onepassword-connect service
  #            (namespace 1password), used by the
  #            community.general.onepassword lookup in ansible/teleport-client
  #            and ansible/teleport-server playbook.yml vars.
  itemPath: "vaults/k8s_secrets/items/semaphore-runner-op-connect_k8s-vms-daniele"
