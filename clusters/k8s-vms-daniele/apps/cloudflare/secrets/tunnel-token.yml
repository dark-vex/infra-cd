---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: tunnel-token
  namespace: cloudflare
spec:
  # Create this item in 1Password with a field:
  #   token - Tunnel token for the prod-k3s cloudflared tunnel (UUID
  #           342302a0-26d4-49a0-ad50-5f416b90085e), obtained via
  #           `cloudflared tunnel token <tunnel-id>` or the Zero Trust
  #           dashboard (Networks -> Tunnels -> select tunnel -> Configure).
  itemPath: "vaults/k8s_secrets/items/cloudflare-tunnel-prod-k3s"
