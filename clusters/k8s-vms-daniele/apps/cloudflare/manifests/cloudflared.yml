---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cloudflared
  namespace: cloudflare
  labels:
    group: cloudflare
spec:
  selector:
    matchLabels:
      app: cloudflared
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: cloudflared
        group: cloudflare
    spec:
      containers:
      - name: cloudflared
        image: cloudflare/cloudflared:2026.3.0@sha256:6b599ca3e974349ead3286d178da61d291961182ec3fe9c505e1dd02c8ac31b0
        args:
        - tunnel
        - --protocol
        - http2
        - --config
        - /etc/cloudflared/config/config.yaml
        - run
        securityContext:
          capabilities:
            drop:
            - NET_RAW
        livenessProbe:
          httpGet:
            path: /ready
            port: 2000
          failureThreshold: 1
          initialDelaySeconds: 10
          periodSeconds: 10
        volumeMounts:
        - name: config
          mountPath: /etc/cloudflared/config
          readOnly: true
        - name: creds
          mountPath: /etc/cloudflared/creds
          readOnly: true
        - name: cert
          mountPath: /etc/cloudflared
          readOnly: true
      volumes:
      - name: creds
        secret:
          # By default, the credentials file will be created under ~/.cloudflared/<tunnel ID>.json
          # when you run `cloudflared tunnel create`. You can move it into a secret by using:
          # ```sh
          # kubectl create secret generic tunnel-credentials \
          # --from-file=credentials.json=/Users/yourusername/.cloudflared/<tunnel ID>.json
          # ```
          secretName: tunnel-credentials
      # Create a config.yaml file from the ConfigMap below.
      - name: config
        configMap:
          name: cloudflared
          items:
          - key: config.yaml
            path: config.yaml
      - name: cert
        secret:
          secretName: tunnel-pem
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared
  namespace: cloudflare
  labels:
    group: cloudflare
data:
  config.yaml: |
    # Name of the tunnel you want to run
    tunnel: kubenuc
    credentials-file: /etc/cloudflared/creds/credentials.json
    # Serves the metrics server under /metrics and the readiness server under /ready
    metrics: 0.0.0.0:2000
    # Autoupdates applied in a k8s pod will be lost when the pod is removed or restarted, so
    # autoupdate doesn't make sense in Kubernetes. However, outside of Kubernetes, we strongly
    # recommend using autoupdate.
    no-autoupdate: true
    # Keep this list explicit so new DNS records do not become reachable through
    # the tunnel unless they are intentionally added here.
    ingress:
    - hostname: ${SEMAPHORE_HOST}
      service: https://traefik.kube-system.svc.cluster.local:443
      originRequest:
        originServerName: ${SEMAPHORE_HOST}
    - hostname: ${AWX_HOST}
      service: https://traefik.kube-system.svc.cluster.local:443
      originRequest:
        originServerName: ${AWX_HOST}
    - hostname: ${TELEPORT_HOST}
      service: https://traefik.kube-system.svc.cluster.local:443
      originRequest:
        originServerName: ${TELEPORT_HOST}
    - service: http_status:404
