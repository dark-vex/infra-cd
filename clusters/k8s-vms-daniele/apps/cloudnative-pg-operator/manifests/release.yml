---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudnative-pg
  namespace: cnpg-system
spec:
  interval: 15m
  maxHistory: 20
  chart:
    spec:
      chart: cloudnative-pg
      version: "0.29.0"
      sourceRef:
        kind: HelmRepository
        name: cloudnative-pg
        namespace: flux-system
      interval: 15m
  install:
    createNamespace: true
    crds: CreateReplace
    remediation:
      retries: 6
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 6
  # Audit-first: warn only logs/events on drift between the Helm release and
  # live cluster state, it never corrects it - a safe first step before any
  # app is promoted to mode: enabled (which would actively revert manual or
  # external changes).
  driftDetection:
    mode: warn
  values:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
