---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: semaphore-db
  namespace: flux-system
spec:
  dependsOn:
    - name: cloudnative-pg-operator
  interval: 15m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./clusters/k8s-vms-daniele/apps/semaphore-db/manifests
  prune: true
  healthChecks:
    - apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      name: semaphore-db
      namespace: semaphore
