---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress
  namespace: nut
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # Metrics scraping from grafana-alloy: nut-exporter (9995, HTTP_PATH /metrics)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: grafana-alloy
      ports:
        - protocol: TCP
          port: 9995
    # Intra-namespace traffic
    - from:
        - podSelector: {}
