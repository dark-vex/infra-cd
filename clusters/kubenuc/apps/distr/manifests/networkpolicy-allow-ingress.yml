---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress
  namespace: distr
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # hub (8080, DISTR_HOST) and artifacts (8585, DISTR_REGISTRY_HOST) are the
    # two ingress-routed ports on the same Service.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: haproxy-ingress
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8585
    # Metrics scraping from grafana-alloy
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: grafana-alloy
    # Intra-namespace traffic (hub, postgresql, rustfs)
    - from:
        - podSelector: {}
