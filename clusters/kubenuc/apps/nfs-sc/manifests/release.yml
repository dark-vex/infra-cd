---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nfs-sc
  namespace: storage
spec:
  interval: 15m
  maxHistory: 20
  chart:
    spec:
      chart: nfs-subdir-external-provisioner
      version: ">=4.0.17"
      sourceRef:
        kind: HelmRepository
        name: kubernetes-sigs-chart
        namespace: flux-system
      interval: 15m
  install:
    createNamespace: true
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  # Audit-first: warn only logs/events on drift between the Helm release and
  # live cluster state, it never corrects it - a safe first step before any
  # app is promoted to mode: enabled (which would actively revert manual or
  # external changes).
  driftDetection:
    mode: warn
  values:
    replicaCount: 0
    nfs:
      server: 10.10.8.5
      path: /volume2/video
      volumeName: syno-nfs
    storageClass:
      name: synology
      reclaimPolicy: Retain
