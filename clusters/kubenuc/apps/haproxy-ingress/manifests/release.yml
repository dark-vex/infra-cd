---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: haproxy-ingress
  namespace: haproxy-ingress
spec:
  interval: 15m
  maxHistory: 20
  chart:
    spec:
      chart: kubernetes-ingress
      version: ">=1.0.0 <2.0.0"
      sourceRef:
        kind: HelmRepository
        name: haproxy-ingress
        namespace: flux-system
      interval: 15m
  install:
    createNamespace: true
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  values:
    controller:
      kind: Deployment
      ingressClass: haproxy
      ingressClassResource:
        name: haproxy
        enabled: true
        default: true
      extraArgs:
      - --configmap-tcp-services=haproxy-ingress/tcp
      service:
        type: LoadBalancer
        externalTrafficPolicy: "Local"
        tcpPorts:
        - name: portainer
          port: 8880
          targetPort: 8000

      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          cpu: 2000m
          memory: 2Gi

      replicaCount: 3

      # Already at 3 replicas - just guard against draining down to 0
      # available during a node drain/upgrade.
      PodDisruptionBudget:
        enable: true
        minAvailable: 1

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                  - kubernetes-ingress
                - key: app.kubernetes.io/instance
                  operator: In
                  values:
                  - haproxy-ingress
              topologyKey: "kubernetes.io/hostname"
      config:
        ssl-redirect: "false"
        client-body-buffer-size: "0"
        forwarded-for: "true"
        request-body-size: "0"
        cors-enable: "true"
        cors-allow-headers: "X-Forwarded-For"
