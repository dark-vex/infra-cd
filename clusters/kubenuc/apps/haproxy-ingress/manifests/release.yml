---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: haproxy-ingress
  namespace: haproxy-ingress
spec:
  interval: 15m
  maxHistory: 20
  chart:
    spec:
      chart: kubernetes-ingress
      version: ">=1.0.0 <2.0.0"
      sourceRef:
        kind: HelmRepository
        name: haproxy-ingress
        namespace: flux-system
      interval: 15m
  install:
    createNamespace: true
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  values:
    controller:
      kind: Deployment
      ingressClass: haproxy
      ingressClassResource:
        name: haproxy
        enabled: true
        default: true
      extraArgs:
      - --configmap-tcp-services=haproxy-ingress/tcp
      service:
        type: LoadBalancer
        externalTrafficPolicy: "Local"
        tcpPorts:
        - name: portainer
          port: 8880
          targetPort: 8000

      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          cpu: 2000m
          memory: 2Gi

      replicaCount: 3
      # Pod anti-affinity to spread across nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                  - kubernetes-ingress
                - key: app.kubernetes.io/instance
                  operator: In
                  values:
                  - haproxy-ingress
              topologyKey: "kubernetes.io/hostname"
      # Enable real IP forwarding
      config:
        ssl-redirect: "false"
        # Client max body size (0 = unlimited)
        client-body-buffer-size: "0"
        # Forward headers
        forwarded-for: "true"
        original-forwarded-for: "true"
        accept-proxy: "true"

