---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: sso
spec:
  interval: 15m
  maxHistory: 20
  chart:
    spec:
      chart: authentik
      version: "2026.5.x"
      sourceRef:
        kind: HelmRepository
        name: goauthentik-chart
        namespace: flux-system
      interval: 15m
  install:
    createNamespace: true
    remediation:
      retries: 5
    disableWait: true
  upgrade:
    remediation:
      retries: 5
    disableWait: true
  values:
    server:
      replicas: 3
      # Previous value (server.containerSecurityContext.securityContext.*)
      # was a confirmed no-op - "securityContext" isn't a valid nested field
      # of v1.SecurityContext, so readOnlyRootFilesystem was never actually
      # enforced. Correct key is one level shallower.
      containerSecurityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        readOnlyRootFilesystem: true
        runAsNonRoot: true
      initContainers:
        - name: check-db-ready
          image: postgres:17@sha256:5c855ad7b85e68e48a62f34662853f38b57c1c1d80f3a927ab58034fd6d31c5e
          command: ["sh", "-c",
            "until pg_isready -h $${AUTHENTIK_POSTGRESQL__HOST} -p 5432;
            do echo waiting for database; sleep 2; done;"]
          env:
            - name: AUTHENTIK_POSTGRESQL__HOST
              valueFrom:
                secretKeyRef:
                  key: PG_HOST
                  name: sso-secrets
          securityContext:
            readOnlyRootFilesystem: true
        - name: init-db
          image: postgres:17@sha256:5c855ad7b85e68e48a62f34662853f38b57c1c1d80f3a927ab58034fd6d31c5e
          imagePullPolicy: Always
          command: ["sh", "-c", "
              psql -U $${PGUSERNAME} -h $${AUTHENTIK_POSTGRESQL__HOST} -c 'CREATE DATABASE authentik;'
              -c \"CREATE USER authentik WITH ENCRYPTED PASSWORD '$${AUTHENTIK_POSTGRESQL__PASSWORD}';\"
              -c 'GRANT ALL PRIVILEGES ON DATABASE authentik TO authentik;'
              -c '\\c authentik postgres'
              -c 'GRANT ALL ON SCHEMA public TO authentik;'"]
          env:
            - name: AUTHENTIK_POSTGRESQL__HOST
              valueFrom:
                secretKeyRef:
                  key: PG_HOST
                  name: sso-secrets
            - name: AUTHENTIK_POSTGRESQL__PASSWORD
              valueFrom:
                secretKeyRef:
                  key: PG_PASS
                  name: sso-secrets
            - name: PGUSERNAME
              valueFrom:
                secretKeyRef:
                  key: PGUSERNAME
                  name: sso-secrets
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  key: PGPASSWORD
                  name: sso-secrets
            - name: AUTHENTIK_POSTGRESQL__SSLMODE
              value: "require"
          securityContext:
            readOnlyRootFilesystem: true
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 2Gi

      ingress:
        ingressClassName: haproxy
        enabled: true
        hosts:
          - ${SSO_AUTHENTIK_HOST}
        annotations:
          cert-manager.io/cluster-issuer: "letsencrypt"
        tls:
          - secretName: sso-tls
            hosts:
              - ${SSO_AUTHENTIK_HOST}

    global:
      # Required for readOnlyRootFilesystem above: AUTHENTIK_STORAGE__FILE__PATH
      # defaults to /data (icons, CSV report exports - not mounted by the
      # chart otherwise), and Django's file-upload handling falls back to
      # /tmp for uploads over the in-memory threshold. Using emptyDir here
      # doesn't change persistence characteristics: without this mount,
      # writes to these paths already went to the container's ephemeral
      # writable layer, lost on restart exactly the same as an emptyDir.
      volumes:
        - name: tmp
          emptyDir: {}
        - name: data
          emptyDir: {}
      volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: data
          mountPath: /data
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
      deploymentStrategy:
        type: RollingUpdate
        rollingUpdate:
          maxSurge: 25%
          maxUnavailable: 50%
      env:
        - name: PG_PASS
          valueFrom:
            secretKeyRef:
              key: PG_PASS
              name: sso-secrets
        - name: AUTHENTIK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              key: AUTHENTIK_SECRET_KEY
              name: sso-secrets
        - name: AUTHENTIK_POSTGRESQL__HOST
          valueFrom:
            secretKeyRef:
              key: PG_HOST
              name: sso-secrets
        - name: AUTHENTIK_POSTGRESQL__PASSWORD
          valueFrom:
            secretKeyRef:
              key: PG_PASS
              name: sso-secrets
        - name: AUTHENTIK_POSTGRESQL__SSLMODE
          value: "require"

    postgresql:
      enabled: false

    redis:
      enabled: true
      global:
        storageClass: "openebs-hostpath"

    worker:
      replicas: 3
      containerSecurityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        readOnlyRootFilesystem: true
        runAsNonRoot: true
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 2Gi
