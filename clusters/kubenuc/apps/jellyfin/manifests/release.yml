---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
  namespace: jellyfin
spec:
  interval: 15m
  maxHistory: 20
  chart:
    spec:
      chart: jellyfin
      version: ">=9.4.2"
      sourceRef:
        kind: HelmRepository
        name: k8s-at-home-charts
        namespace: flux-system
      interval: 15m
  install:
    createNamespace: true
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  # Audit-first: warn only logs/events on drift between the Helm release and
  # live cluster state, it never corrects it - a safe first step before any
  # app is promoted to mode: enabled (which would actively revert manual or
  # external changes).
  driftDetection:
    mode: warn
  values:
    controller:
      replicas: 0
    image:
      tag: latest
      pullPolicy: Always
    # runAsUser/runAsNonRoot intentionally left unset: the existing
    # openebs-hostpath config PVC has data written by the image's default
    # (root) user with no live cluster available to verify a UID switch
    # won't hit permission-denied on it
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true
    env:
      JELLYFIN_PublishedServerUrl: jellyfin
      TZ: Europe/Rome
    #resources:
    #  requests:
    #    gpu.intel.com/i915: 1
    #  limits:
    #    gpu.intel.com/i915: 1
    ingress:
      main:
        ingressClassName: haproxy
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt
        enabled: true
        hosts:
          - host: ${JELLYFIN_HOST}
            paths:
              - path: /
                pathType: Prefix
        tls:
          - secretName: mydomain-production
            hosts:
              - ${JELLYFIN_HOST}
    persistence:
      config:
        enabled: true
        storageClass: openebs-hostpath
