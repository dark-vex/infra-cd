---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: s3
  namespace: nextcloud-fastnetserv
spec:
  interval: 15m
  maxHistory: 20
  chart:
    spec:
      chart: seaweedfs
      version: "4.39.0"
      sourceRef:
        kind: HelmRepository
        name: seaweedfs
        namespace: flux-system
      interval: 15m
  install:
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  # Audit-first: warn only logs/events on drift between the Helm release and
  # live cluster state, it never corrects it - a safe first step before any
  # app is promoted to mode: enabled (which would actively revert manual or
  # external changes).
  driftDetection:
    mode: warn
  values:
    master:
      replicaCount: 1
      persistence:
        storageClass: "openebs-hostpath"
        size: 100Mi

    volume:
      replicaCount: 3
      persistence:
        storageClass: "openebs-hostpath"
        size: 10Gi

    filer:
      replicaCount: 1
      persistence:
        storageClass: "openebs-hostpath"
        size: 100Mi

    s3:
      enabled: true
      ingress:
        enabled: true
        className: "haproxy"
        host: ${S3_API_HOST}
        annotations:
          cert-manager.io/cluster-issuer: "letsencrypt"
          haproxy.org/request-body-size: "500m"
        tls:
        - secretName: s3-tls
          hosts:
            - ${S3_API_HOST}
