---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openebs
  namespace: openebs
spec:
  interval: 15m
  maxHistory: 20
  chart:
    spec:
      chart: openebs
      sourceRef:
        kind: HelmRepository
        name: openebs
        namespace: flux-system
      interval: 15m
  install:
    createNamespace: true
    remediation:
      retries: 6
  upgrade:
    remediation:
      retries: 6
  # Audit-first: warn only logs/events on drift between the Helm release and
  # live cluster state, it never corrects it - a safe first step before any
  # app is promoted to mode: enabled (which would actively revert manual or
  # external changes).
  driftDetection:
    mode: warn
  values:
    # Only local.hostpath is active (default true, not overridden below) -
    # every other engine is explicitly disabled, so localpv-provisioner is
    # the only workload this chart actually runs here. Conservative
    # documented estimate (not sized from live usage - no Grafana access
    # this session); this is the storage provisioner every PVC-backed app
    # in the cluster depends on, so under-provisioning it risks stuck
    # volume creates cluster-wide, not just its own pod.
    localpv-provisioner:
      localpv:
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            memory: 128Mi
    engines:
      replicated:
        mayastor:
          enabled: false
      local:
        zfs:
          enabled: false
        lvm:
          enabled: false
    zfs-localpv:
      crds:
        zfsLocalPv:
          enabled: false
    lvm-localpv:
      crds:
        lvmLocalPv:
          enabled: false
