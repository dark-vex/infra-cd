---
apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Provider
metadata:
  name: slack
  namespace: flux-system
spec:
  type: slack
  channel: infrastructure
  secretRef:
    name: slack-url
---
apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Alert
metadata:
  name: fluxcd-notifications
  namespace: flux-system
spec:
  summary: "cluster status"
  providerRef:
    name: slack
  eventMetadata:
    env: "production"
    cluster: "kubenuc"
    region: "milan"
  eventSeverity: error
  eventSources:
    - kind: GitRepository
      name: '*'
    - kind: Kustomization
      name: charts
    - kind: HelmRelease
      name: '*'
#    - kind: Kustomization
#      name: '*'
  exclusionList:
    - "error.*lookup github\\.com"
    - "error.*lookup raw\\.githubusercontent\\.com"
    - "dial.*tcp.*timeout"
    - "waiting.*socket"
---
apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Provider
metadata:
  name: betterstack-bridge
  namespace: flux-system
spec:
  type: generic
  address: http://betterstack-bridge.flux-system.svc.cluster.local:8080/flux-event
---
apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Alert
metadata:
  name: nextcloud-maintenance
  namespace: flux-system
spec:
  providerRef:
    name: betterstack-bridge
  eventSeverity: info
  eventSources:
    - kind: HelmRelease
      name: nextcloud
      namespace: nextcloud-fastnetserv
    # HelmChart is created by helm-controller in the HelmRepository's
    # namespace (flux-system) with name "<hr-namespace>-<hr-name>".
    # ChartPullSucceeded fires when a new chart version is fetched,
    # immediately before the upgrade runs.
    - kind: HelmChart
      name: nextcloud-fastnetserv-nextcloud
      namespace: flux-system
    # Kustomization fires Progressing when it starts applying manifests,
    # before helm-controller observes the new HelmRelease spec. This is the
    # correct pre-upgrade hook for values-only changes (e.g. image digest bumps)
    # where DriftDetected and ChartPullSucceeded never fire.
    # ReconciliationSucceeded/Failed are used as close triggers for fast unpause
    # on no-op reconcile cycles (real upgrades unpause via HelmRelease terminal events).
    - kind: Kustomization
      name: nextcloud
      namespace: flux-system
