---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: flux-webhook
  namespace: flux-system
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt"
    # Opt-in gate for kubenuc's external-dns instance (annotationFilter
    # requires this exact key) - target is the Cloudflare Tunnel, not this
    # Ingress's LB status, since every app host here is tunnel-fronted, not
    # directly reachable. Never hardcode the tunnel target - it comes from
    # cluster-vars.
    external-dns.alpha.kubernetes.io/managed-by: external-dns
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
    external-dns.alpha.kubernetes.io/target: ${CLOUDFLARE_TUNNEL_TARGET}
spec:
  ingressClassName: haproxy
  tls:
    - secretName: flux-webhook-tls
      hosts:
        - ${FLUX_WEBHOOK_HOST:=flux-webhook.invalid.example}
  rules:
    - host: ${FLUX_WEBHOOK_HOST:=flux-webhook.invalid.example}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: webhook-receiver
                port:
                  number: 80
