---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana-k8s-monitoring
  namespace: grafana-alloy
spec:
  interval: 15m
  timeout: 10m
  maxHistory: 20
  chart:
    spec:
      chart: k8s-monitoring
      version: "3.x.x"
      sourceRef:
        kind: HelmRepository
        name: grafana-charts
        namespace: flux-system
      interval: 15m
  install:
    createNamespace: true
    remediation:
      retries: 6
  upgrade:
    remediation:
      retries: 6
  # Inject secrets from 1Password into Helm values
  # The secret "grafana-cloud-credentials" must contain:
  #   password          - Grafana Cloud API key (shared across all destinations)
  #   metrics-username  - Prometheus/Mimir instance username
  #   logs-username     - Loki instance username
  #   otlp-username     - OTLP gateway username
  #   fleet-username    - Fleet Management username
  #
  # The secret "graylog-alloy-creds" must contain:
  #   url               - Graylog OpenTelemetry gRPC endpoint
  #                       (format: host:port, no http:// prefix — e.g. graylog.graylog.svc.cluster.local:4317)
  #   bearer_token      - Graylog bearer token (configured in System → Inputs → OpenTelemetry gRPC)
  valuesFrom:
    # --- Destination passwords (all use the same API key) ---
    - kind: Secret
      name: grafana-cloud-credentials
      valuesKey: password
      targetPath: destinations[0].auth.password
    - kind: Secret
      name: grafana-cloud-credentials
      valuesKey: password
      targetPath: destinations[1].auth.password
    - kind: Secret
      name: grafana-cloud-credentials
      valuesKey: password
      targetPath: destinations[2].auth.password
    # --- Destination usernames ---
    - kind: Secret
      name: grafana-cloud-credentials
      valuesKey: metrics-username
      targetPath: destinations[0].auth.username
    - kind: Secret
      name: grafana-cloud-credentials
      valuesKey: logs-username
      targetPath: destinations[1].auth.username
    - kind: Secret
      name: grafana-cloud-credentials
      valuesKey: otlp-username
      targetPath: destinations[2].auth.username
    # --- Graylog OTLP gRPC destination ---
    - kind: Secret
      name: graylog-alloy-creds
      valuesKey: url
      targetPath: destinations[3].url
    - kind: Secret
      name: graylog-alloy-creds
      valuesKey: bearer_token
      targetPath: destinations[3].auth.bearerToken
    # --- Fleet Management remote config passwords ---
    - kind: Secret
      name: grafana-cloud-credentials
      valuesKey: password
      targetPath: alloy-metrics.remoteConfig.auth.password
    - kind: Secret
      name: grafana-cloud-credentials
      valuesKey: fleet-username
      targetPath: alloy-metrics.remoteConfig.auth.username
    - kind: Secret
      name: grafana-cloud-credentials
      valuesKey: password
      targetPath: alloy-singleton.remoteConfig.auth.password
    - kind: Secret
      name: grafana-cloud-credentials
      valuesKey: fleet-username
      targetPath: alloy-singleton.remoteConfig.auth.username
    - kind: Secret
      name: grafana-cloud-credentials
      valuesKey: password
      targetPath: alloy-logs.remoteConfig.auth.password
    - kind: Secret
      name: grafana-cloud-credentials
      valuesKey: fleet-username
      targetPath: alloy-logs.remoteConfig.auth.username
    - kind: Secret
      name: grafana-cloud-credentials
      valuesKey: password
      targetPath: alloy-receiver.remoteConfig.auth.password
    - kind: Secret
      name: grafana-cloud-credentials
      valuesKey: fleet-username
      targetPath: alloy-receiver.remoteConfig.auth.username
  values:
    cluster:
      name: kubenuc

    destinations:
      - name: grafana-cloud-metrics
        type: prometheus
        url: https://prometheus-prod-58-prod-eu-central-0.grafana.net/api/prom/push
        auth:
          type: basic
          # username and password injected via valuesFrom
        metricProcessingRules: |
          write_relabel_config {
            source_labels = ["__name__"]
            regex = "alloy_component_dependencies_wait_seconds_bucket|alloy_component_evaluation_seconds_bucket|alloy_component_evaluation_seconds_(sum|count)|alloy_component_controller_running_components|prometheus_remote_storage_sent_batch_duration_seconds_bucket|cluster_.*"
            action = "drop"
          }
      - name: grafana-cloud-logs
        type: loki
        url: https://logs-prod-039.grafana.net/loki/api/v1/push
        auth:
          type: basic
      - name: gc-otlp-endpoint
        type: otlp
        url: https://otlp-gateway-prod-eu-central-0.grafana.net/otlp
        protocol: http
        auth:
          type: basic
        metrics:
          enabled: true
        logs:
          enabled: true
        traces:
          enabled: true
      - name: graylog-otlp
        type: otlp
        protocol: grpc
        # url injected via valuesFrom from graylog-alloy-creds secret
        # url format: host:port (no http:// prefix), e.g. graylog.graylog.svc.cluster.local:4317
        auth:
          type: bearerToken
          # bearerToken injected via valuesFrom from graylog-alloy-creds secret
        logs:
          enabled: true

    # Settings applied to all Alloy instances (metrics, singleton, logs, receiver)
    collectorCommon:
      alloy:
        controller:
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: kubernetes.io/hostname
                        operator: NotIn
                        values:
                          - kubenuc-m1
                          - kubenuc-w1

    clusterMetrics:
      enabled: true
      kepler:
        enabled: false
      metricsTuning:
        useIntegrationAllowList: true
      kube-state-metrics:
        metricsTuning:
          excludeMetrics:
            - kube_replicaset_created
            - kube_replicaset_metadata_generation
            - kube_replicaset_status_observed_generation
            - kube_replicaset_status_fully_labeled_replicas
            - kube_replicaset_owner
            - kube_pod_status_reason
            - kube_secret_metadata_resource_version
            - kube_deployment_status_condition
      node-exporter:
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: kubernetes.io/hostname
                      operator: NotIn
                      values:
                        - kubenuc-m1
                        - kubenuc-w1

    clusterEvents:
      enabled: true

    podLogs:
      enabled: true
      extraStageBlocks: |
        stage.drop {
          expression          = ".*level=debug.*"
          drop_counter_reason = "debug_noise"
        }
        stage.drop {
          expression          = ".*level=info.*"
          drop_counter_reason = "info_noise"
        }
        stage.drop {
          expression          = ".*(healthcheck|readiness|liveness|health_check|/healthz|/readyz|/livez).*"
          drop_counter_reason = "probe_noise"
        }
        stage.drop {
          expression          = ".*Reconciliation finished.*"
          drop_counter_reason = "flux_reconcile_noise"
        }
        stage.drop {
          expression          = ".*\" (2[0-9]{2}|3[0-9]{2}) .*"
          drop_counter_reason = "success_access_logs"
        }

    applicationObservability:
      enabled: true
      receivers:
        otlp:
          grpc:
            enabled: true
            port: 4317
          http:
            enabled: true
            port: 4318
        zipkin:
          enabled: true
          port: 9411

    alloy-metrics:
      enabled: true
      controller:
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: kubernetes.io/hostname
                      operator: NotIn
                      values:
                        - kubenuc-m1
                        - kubenuc-w1
      alloy:
        extraEnv:
          - name: GCLOUD_RW_API_KEY
            valueFrom:
              secretKeyRef:
                name: alloy-metrics-remote-cfg-grafana-k8s-monitoring
                key: password
          - name: CLUSTER_NAME
            value: kubenuc
          - name: NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          - name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
          - name: GCLOUD_FM_COLLECTOR_ID
            value: grafana-k8s-monitoring-$(CLUSTER_NAME)-$(NAMESPACE)-$(POD_NAME)
      remoteConfig:
        enabled: true
        url: https://fleet-management-prod-024.grafana.net
        auth:
          type: basic
          # username and password injected via valuesFrom

    alloy-singleton:
      enabled: true
      controller:
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: kubernetes.io/hostname
                      operator: NotIn
                      values:
                        - kubenuc-m1
                        - kubenuc-w1
      alloy:
        extraEnv:
          - name: GCLOUD_RW_API_KEY
            valueFrom:
              secretKeyRef:
                name: alloy-singleton-remote-cfg-grafana-k8s-monitoring
                key: password
          - name: CLUSTER_NAME
            value: kubenuc
          - name: NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          - name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
          - name: GCLOUD_FM_COLLECTOR_ID
            value: grafana-k8s-monitoring-$(CLUSTER_NAME)-$(NAMESPACE)-$(POD_NAME)
      remoteConfig:
        enabled: true
        url: https://fleet-management-prod-024.grafana.net
        auth:
          type: basic

    alloy-logs:
      enabled: true
      controller:
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: kubernetes.io/hostname
                      operator: NotIn
                      values:
                        - kubenuc-m1
                        - kubenuc-w1
      alloy:
        extraEnv:
          - name: GCLOUD_RW_API_KEY
            valueFrom:
              secretKeyRef:
                name: alloy-logs-remote-cfg-grafana-k8s-monitoring
                key: password
          - name: CLUSTER_NAME
            value: kubenuc
          - name: NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          - name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
          - name: NODE_NAME
            valueFrom:
              fieldRef:
                fieldPath: spec.nodeName
          - name: GCLOUD_FM_COLLECTOR_ID
            value: grafana-k8s-monitoring-$(CLUSTER_NAME)-$(NAMESPACE)-alloy-logs-$(NODE_NAME)
          - name: GRAYLOG_URL
            valueFrom:
              secretKeyRef:
                name: graylog-alloy-creds
                key: url
          - name: GRAYLOG_BEARER_TOKEN
            valueFrom:
              secretKeyRef:
                name: graylog-alloy-creds
                key: bearer_token
      # extraConfig is a k8s-monitoring chart-level key (not alloy sub-chart).
      # It gets appended to the chart-generated Alloy config in the ConfigMap.
      extraConfig: |
          // Independent Graylog pod-log pipeline.
          // The k8s-monitoring chart v3 does not route podLogs to OTLP destinations,
          // so we build a parallel pipeline: discover → scrape → filter → OTLP export.

          discovery.kubernetes "graylog_pods" {
            role = "pod"
          }

          loki.source.kubernetes "graylog_pods" {
            targets    = discovery.kubernetes.graylog_pods.targets
            forward_to = [loki.process.graylog_filter.receiver]
          }

          loki.process "graylog_filter" {
            stage.drop {
              expression          = ".*level=debug.*"
              drop_counter_reason = "graylog_debug_noise"
            }
            stage.drop {
              expression          = ".*level=info.*"
              drop_counter_reason = "graylog_info_noise"
            }
            stage.drop {
              expression          = ".*(healthcheck|readiness|liveness|health_check|/healthz|/readyz|/livez).*"
              drop_counter_reason = "graylog_probe_noise"
            }
            stage.drop {
              expression          = ".*Reconciliation finished.*"
              drop_counter_reason = "graylog_flux_noise"
            }
            stage.drop {
              expression          = ".*\" (2[0-9]{2}|3[0-9]{2}) .*"
              drop_counter_reason = "graylog_success_access_logs"
            }
            forward_to = [otelcol.receiver.loki.graylog_bridge.receiver]
          }

          otelcol.receiver.loki "graylog_bridge" {
            output {
              logs = [otelcol.exporter.otlp.graylog.input]
            }
          }

          otelcol.auth.bearer "graylog" {
            token = sys.env("GRAYLOG_BEARER_TOKEN")
          }

          otelcol.exporter.otlp "graylog" {
            client {
              endpoint = sys.env("GRAYLOG_URL")
              auth     = otelcol.auth.bearer.graylog.handler
              tls {
                insecure = false
              }
            }
          }
      remoteConfig:
        enabled: true
        url: https://fleet-management-prod-024.grafana.net
        auth:
          type: basic

    alloy-receiver:
      enabled: true
      controller:
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: kubernetes.io/hostname
                      operator: NotIn
                      values:
                        - kubenuc-m1
                        - kubenuc-w1
      alloy:
        extraPorts:
          - name: otlp-grpc
            port: 4317
            targetPort: 4317
            protocol: TCP
          - name: otlp-http
            port: 4318
            targetPort: 4318
            protocol: TCP
          - name: zipkin
            port: 9411
            targetPort: 9411
            protocol: TCP
        extraEnv:
          - name: GCLOUD_RW_API_KEY
            valueFrom:
              secretKeyRef:
                name: alloy-receiver-remote-cfg-grafana-k8s-monitoring
                key: password
          - name: CLUSTER_NAME
            value: kubenuc
          - name: NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          - name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
          - name: NODE_NAME
            valueFrom:
              fieldRef:
                fieldPath: spec.nodeName
          - name: GCLOUD_FM_COLLECTOR_ID
            value: grafana-k8s-monitoring-$(CLUSTER_NAME)-$(NAMESPACE)-alloy-receiver-$(NODE_NAME)
      remoteConfig:
        enabled: true
        url: https://fleet-management-prod-024.grafana.net
        auth:
          type: basic
