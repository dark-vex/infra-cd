---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana-k8s-monitoring
  namespace: grafana-alloy
spec:
  interval: 15m
  timeout: 10m
  maxHistory: 20
  chart:
    spec:
      chart: k8s-monitoring
      version: ">=2.0.0"
      sourceRef:
        kind: HelmRepository
        name: grafana-charts
        namespace: flux-system
      interval: 15m
  install:
    createNamespace: true
    remediation:
      retries: 6
  upgrade:
    remediation:
      retries: 6
  # Inject secrets from 1Password into Helm values
  # The secret "grafana-cloud-credentials" must contain:
  #   password          - Grafana Cloud API key (shared across all destinations)
  #   metrics-username  - Prometheus/Mimir instance username
  #   logs-username     - Loki instance username
  #   otlp-username     - OTLP gateway username
  #   fleet-username    - Fleet Management username
  valuesFrom:
    # --- Destination passwords (all use the same API key) ---
    - kind: Secret
      name: grafana-cloud-credentials
      valuesKey: password
      targetPath: destinations.grafana-cloud-metrics.auth.password
    - kind: Secret
      name: grafana-cloud-credentials
      valuesKey: password
      targetPath: destinations.grafana-cloud-logs.auth.password
    - kind: Secret
      name: grafana-cloud-credentials
      valuesKey: password
      targetPath: destinations.gc-otlp-endpoint.auth.password
    # --- Destination usernames ---
    - kind: Secret
      name: grafana-cloud-credentials
      valuesKey: metrics-username
      targetPath: destinations.grafana-cloud-metrics.auth.username
    - kind: Secret
      name: grafana-cloud-credentials
      valuesKey: logs-username
      targetPath: destinations.grafana-cloud-logs.auth.username
    - kind: Secret
      name: grafana-cloud-credentials
      valuesKey: otlp-username
      targetPath: destinations.gc-otlp-endpoint.auth.username
    # --- Fleet Management remote config passwords ---
    - kind: Secret
      name: grafana-cloud-credentials
      valuesKey: password
      targetPath: collectors.alloy-metrics.remoteConfig.auth.password
    - kind: Secret
      name: grafana-cloud-credentials
      valuesKey: fleet-username
      targetPath: collectors.alloy-metrics.remoteConfig.auth.username
    - kind: Secret
      name: grafana-cloud-credentials
      valuesKey: password
      targetPath: collectors.alloy-singleton.remoteConfig.auth.password
    - kind: Secret
      name: grafana-cloud-credentials
      valuesKey: fleet-username
      targetPath: collectors.alloy-singleton.remoteConfig.auth.username
    - kind: Secret
      name: grafana-cloud-credentials
      valuesKey: password
      targetPath: collectors.alloy-logs.remoteConfig.auth.password
    - kind: Secret
      name: grafana-cloud-credentials
      valuesKey: fleet-username
      targetPath: collectors.alloy-logs.remoteConfig.auth.username
    - kind: Secret
      name: grafana-cloud-credentials
      valuesKey: password
      targetPath: collectors.alloy-receiver.remoteConfig.auth.password
    - kind: Secret
      name: grafana-cloud-credentials
      valuesKey: fleet-username
      targetPath: collectors.alloy-receiver.remoteConfig.auth.username
  values:
    cluster:
      name: kubenuc

    destinations:
      grafana-cloud-metrics:
        type: prometheus
        url: https://prometheus-prod-58-prod-eu-central-0.grafana.net/api/prom/push
        auth:
          type: basic
          # username and password injected via valuesFrom
      grafana-cloud-logs:
        type: loki
        url: https://logs-prod-039.grafana.net/loki/api/v1/push
        auth:
          type: basic
      gc-otlp-endpoint:
        type: otlp
        url: https://otlp-gateway-prod-eu-central-0.grafana.net/otlp
        protocol: http
        auth:
          type: basic
        metrics:
          enabled: true
        logs:
          enabled: true
        traces:
          enabled: true

    # Settings applied to all Alloy instances (metrics, singleton, logs, receiver)
    collectorCommon:
      alloy:
        controller:
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: kubernetes.io/hostname
                        operator: NotIn
                        values:
                          - kubenuc-m1
                          - kubenuc-w1

    clusterMetrics:
      enabled: true
      kepler:
        enabled: true
      node-exporter:
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: kubernetes.io/hostname
                      operator: NotIn
                      values:
                        - kubenuc-m1
                        - kubenuc-w1

    clusterEvents:
      enabled: true

    podLogs:
      enabled: true

    applicationObservability:
      enabled: true
      receivers:
        otlp:
          grpc:
            enabled: true
            port: 4317
          http:
            enabled: true
            port: 4318
        zipkin:
          enabled: true
          port: 9411

    collectors:
      alloy-metrics:
        enabled: true
        controller:
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: kubernetes.io/hostname
                        operator: NotIn
                        values:
                          - kubenuc-m1
                          - kubenuc-w1
        alloy:
          extraEnv:
            - name: GCLOUD_RW_API_KEY
              valueFrom:
                secretKeyRef:
                  name: alloy-metrics-remote-cfg-grafana-k8s-monitoring
                  key: password
            - name: CLUSTER_NAME
              value: kubenuc
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: GCLOUD_FM_COLLECTOR_ID
              value: grafana-k8s-monitoring-$(CLUSTER_NAME)-$(NAMESPACE)-$(POD_NAME)
        remoteConfig:
          enabled: true
          url: https://fleet-management-prod-024.grafana.net
          auth:
            type: basic
            # username and password injected via valuesFrom

      alloy-singleton:
        enabled: true
        controller:
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: kubernetes.io/hostname
                        operator: NotIn
                        values:
                          - kubenuc-m1
                          - kubenuc-w1
        alloy:
          extraEnv:
            - name: GCLOUD_RW_API_KEY
              valueFrom:
                secretKeyRef:
                  name: alloy-singleton-remote-cfg-grafana-k8s-monitoring
                  key: password
            - name: CLUSTER_NAME
              value: kubenuc
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: GCLOUD_FM_COLLECTOR_ID
              value: grafana-k8s-monitoring-$(CLUSTER_NAME)-$(NAMESPACE)-$(POD_NAME)
        remoteConfig:
          enabled: true
          url: https://fleet-management-prod-024.grafana.net
          auth:
            type: basic

      alloy-logs:
        enabled: true
        controller:
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: kubernetes.io/hostname
                        operator: NotIn
                        values:
                          - kubenuc-m1
                          - kubenuc-w1
        alloy:
          extraConfig: |
            loki.source.kubernetes "pods" {
              targets    = discovery.kubernetes.pods.targets
              forward_to = [loki.process.filter_logs.receiver]
            }

            loki.process "filter_logs" {
              // Drop debug logs
              stage.drop {
                expression          = ".*level=debug.*"
                drop_counter_reason = "debug_noise"
              }
              // Drop health checks
              stage.drop {
                expression          = ".*(healthcheck|readiness|liveness).*"
                drop_counter_reason = "probe_noise"
              }

              forward_to = [loki.write.default.receiver]
            }

            loki.write "default" {
              endpoint {
                url = "http://loki-gateway/loki/api/v1/push"
              }
            }
          extraEnv:
            - name: GCLOUD_RW_API_KEY
              valueFrom:
                secretKeyRef:
                  name: alloy-logs-remote-cfg-grafana-k8s-monitoring
                  key: password
            - name: CLUSTER_NAME
              value: kubenuc
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: GCLOUD_FM_COLLECTOR_ID
              value: grafana-k8s-monitoring-$(CLUSTER_NAME)-$(NAMESPACE)-alloy-logs-$(NODE_NAME)
        remoteConfig:
          enabled: true
          url: https://fleet-management-prod-024.grafana.net
          auth:
            type: basic

      alloy-receiver:
        enabled: true
        controller:
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: kubernetes.io/hostname
                        operator: NotIn
                        values:
                          - kubenuc-m1
                          - kubenuc-w1
        alloy:
          extraPorts:
            - name: otlp-grpc
              port: 4317
              targetPort: 4317
              protocol: TCP
            - name: otlp-http
              port: 4318
              targetPort: 4318
              protocol: TCP
            - name: zipkin
              port: 9411
              targetPort: 9411
              protocol: TCP
          extraEnv:
            - name: GCLOUD_RW_API_KEY
              valueFrom:
                secretKeyRef:
                  name: alloy-receiver-remote-cfg-grafana-k8s-monitoring
                  key: password
            - name: CLUSTER_NAME
              value: kubenuc
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: GCLOUD_FM_COLLECTOR_ID
              value: grafana-k8s-monitoring-$(CLUSTER_NAME)-$(NAMESPACE)-alloy-receiver-$(NODE_NAME)
        remoteConfig:
          enabled: true
          url: https://fleet-management-prod-024.grafana.net
          auth:
            type: basic
