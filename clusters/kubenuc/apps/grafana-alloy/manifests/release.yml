---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana-alloy
  namespace: grafana-alloy
spec:
  interval: 15m
  maxHistory: 20
  chart:
    spec:
      chart: alloy
      version: ">=1.0.0"
      sourceRef:
        kind: HelmRepository
        name: grafana-charts
        namespace: flux-system
      interval: 15m
  install:
    createNamespace: true
    remediation:
      retries: 6
  upgrade:
    remediation:
      retries: 6
  values:
    alloy:
      configMap:
        content: |
          // ============================================================
          // Grafana Alloy configuration — kubenuc cluster
          // Collects logs and metrics and forwards to Grafana Cloud
          // ============================================================

          // --- Kubernetes pod log collection ---
          discovery.kubernetes "pods" {
            role = "pod"
          }

          discovery.relabel "pod_logs" {
            targets = discovery.kubernetes.pods.targets

            rule {
              source_labels = ["__meta_kubernetes_namespace"]
              action        = "replace"
              target_label  = "namespace"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_name"]
              action        = "replace"
              target_label  = "pod"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_container_name"]
              action        = "replace"
              target_label  = "container"
            }
            rule {
              source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_name"]
              separator     = "/"
              target_label  = "job"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
              separator     = "/"
              action        = "replace"
              replacement   = "/var/log/pods/*$1/*.log"
              target_label  = "__path__"
            }
            rule {
              action        = "replace"
              target_label  = "cluster"
              replacement   = "kubenuc"
            }
          }

          loki.source.file "pod_logs" {
            targets    = discovery.relabel.pod_logs.output
            forward_to = [loki.write.grafana_cloud.receiver]
          }

          // --- Loki write to Grafana Cloud ---
          loki.write "grafana_cloud" {
            endpoint {
              url = env("GRAFANA_CLOUD_LOKI_URL")

              basic_auth {
                username = env("GRAFANA_CLOUD_LOKI_USER")
                password = env("GRAFANA_CLOUD_API_KEY")
              }
            }
          }

          // --- Kubernetes service discovery for metrics ---
          discovery.kubernetes "nodes" {
            role = "node"
          }

          discovery.relabel "node_metrics" {
            targets = discovery.kubernetes.nodes.targets

            rule {
              action        = "replace"
              target_label  = "cluster"
              replacement   = "kubenuc"
            }
          }

          prometheus.scrape "kubernetes_nodes" {
            targets    = discovery.relabel.node_metrics.output
            forward_to = [prometheus.remote_write.grafana_cloud.receiver]
            honor_labels = true
          }

          // --- Prometheus remote write to Grafana Cloud Mimir ---
          prometheus.remote_write "grafana_cloud" {
            endpoint {
              url = env("GRAFANA_CLOUD_PROM_URL")

              basic_auth {
                username = env("GRAFANA_CLOUD_PROM_USER")
                password = env("GRAFANA_CLOUD_API_KEY")
              }
            }
          }

    controller:
      type: daemonset

    rbac:
      create: true

    serviceAccount:
      create: true
      name: grafana-alloy

    # Mount host log paths for DaemonSet log collection
    extraVolumes:
      - name: varlog
        hostPath:
          path: /var/log
      - name: varlibdockercontainers
        hostPath:
          path: /var/lib/docker/containers

    extraVolumeMounts:
      - name: varlog
        mountPath: /var/log
        readOnly: true
      - name: varlibdockercontainers
        mountPath: /var/lib/docker/containers
        readOnly: true

    # Inject Grafana Cloud credentials from 1Password-backed secret
    extraEnv:
      - name: GRAFANA_CLOUD_API_KEY
        valueFrom:
          secretKeyRef:
            name: grafana-cloud-credentials
            key: api-key
      - name: GRAFANA_CLOUD_LOKI_URL
        valueFrom:
          secretKeyRef:
            name: grafana-cloud-credentials
            key: loki-url
      - name: GRAFANA_CLOUD_LOKI_USER
        valueFrom:
          secretKeyRef:
            name: grafana-cloud-credentials
            key: loki-user
      - name: GRAFANA_CLOUD_PROM_URL
        valueFrom:
          secretKeyRef:
            name: grafana-cloud-credentials
            key: prometheus-url
      - name: GRAFANA_CLOUD_PROM_USER
        valueFrom:
          secretKeyRef:
            name: grafana-cloud-credentials
            key: prometheus-user
