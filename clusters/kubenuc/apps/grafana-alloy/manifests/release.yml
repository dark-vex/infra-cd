---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana-k8s-monitoring
  namespace: grafana-alloy
spec:
  interval: 15m
  timeout: 10m
  maxHistory: 20
  chart:
    spec:
      chart: k8s-monitoring
      version: "3.x.x"
      sourceRef:
        kind: HelmRepository
        name: grafana-charts
        namespace: flux-system
      interval: 15m
  install:
    createNamespace: true
    remediation:
      retries: 6
  upgrade:
    remediation:
      retries: 6
  # Inject secrets from 1Password into Helm values
  # The secret "grafana-cloud-credentials" must contain:
  #   password          - Grafana Cloud API key (shared across all destinations)
  #   metrics-username  - Prometheus/Mimir instance username
  #   logs-username     - Loki instance username
  #   otlp-username     - OTLP gateway username
  #
  # The secret "graylog-alloy-creds" must contain:
  #   url               - Graylog OpenTelemetry gRPC endpoint
  #                       (format: host:port, no http:// prefix — e.g. graylog.graylog.svc.cluster.local:4317)
  #   bearer_token      - Graylog bearer token (configured in System → Inputs → OpenTelemetry gRPC)
  valuesFrom:
    # --- Destination passwords (all use the same API key) ---
    - kind: Secret
      name: grafana-cloud-credentials
      valuesKey: password
      targetPath: destinations[0].auth.password
    - kind: Secret
      name: grafana-cloud-credentials
      valuesKey: password
      targetPath: destinations[1].auth.password
    - kind: Secret
      name: grafana-cloud-credentials
      valuesKey: password
      targetPath: destinations[2].auth.password
    # --- Destination usernames ---
    - kind: Secret
      name: grafana-cloud-credentials
      valuesKey: metrics-username
      targetPath: destinations[0].auth.username
    - kind: Secret
      name: grafana-cloud-credentials
      valuesKey: logs-username
      targetPath: destinations[1].auth.username
    - kind: Secret
      name: grafana-cloud-credentials
      valuesKey: otlp-username
      targetPath: destinations[2].auth.username
    # --- Graylog OTLP gRPC destination ---
    - kind: Secret
      name: graylog-alloy-creds
      valuesKey: url
      targetPath: destinations[3].url
    - kind: Secret
      name: graylog-alloy-creds
      valuesKey: bearer_token
      targetPath: destinations[3].auth.bearerToken
  values:
    cluster:
      name: kubenuc

    destinations:
      - name: grafana-cloud-metrics
        type: prometheus
        url: ${GRAFANA_PROMETHEUS_URL}
        auth:
          type: basic
          # username and password injected via valuesFrom
        metricProcessingRules: |
          write_relabel_config {
            source_labels = ["__name__"]
            regex         = "(alloy|prometheus_remote_storage|prometheus_target|prometheus_sd|scrape|otelcol|receiver|exporter|cluster|go|process)_.*|up|scrape_.*"
            action        = "drop"
          }
      - name: grafana-cloud-logs
        type: loki
        url: ${GRAFANA_LOKI_URL}
        auth:
          type: basic
      - name: gc-otlp-endpoint
        type: otlp
        url: ${GRAFANA_OTLP_URL}
        protocol: http
        auth:
          type: basic
        metrics:
          enabled: true
        logs:
          enabled: true
        traces:
          enabled: true
      - name: graylog-otlp
        type: otlp
        protocol: grpc
        # url injected via valuesFrom from graylog-alloy-creds secret
        # url format: host:port (no http:// prefix), e.g. graylog.graylog.svc.cluster.local:4317
        auth:
          type: bearerToken
          # bearerToken injected via valuesFrom from graylog-alloy-creds secret
        logs:
          enabled: true
        processors:
          filters:
            enabled: true
            errorMode: ignore
            logs:
              logRecord:
                # Drop records whose OTel severity_text is debug/warn/error/fatal/critical.
                # Records with severity_text="info" or unset pass through.
                - 'severity_text != "" and IsMatch(severity_text, "(?i)^(debug|warn|warning|error|fatal|critical)$")'
                # Fallback for logs without severity_text: structured level= field.
                - 'IsMatch(body, "(?i)level=(warn|warning|error|fatal|critical|debug)")'
                # Fallback: klog E/W/F prefix (e.g. "E0421 ", "W0421 ").
                - 'IsMatch(body, "^[EWF][0-9]{4} ")'

    # Settings applied to all Alloy instances (metrics, singleton, logs, receiver)
    collectorCommon:
      alloy:
        controller:
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: kubernetes.io/hostname
                        operator: NotIn
                        values:
                          - kubenuc-m1
                          - kubenuc-w1

    selfReporting:
      enabled: false

    clusterMetrics:
      enabled: true
      kepler:
        enabled: false
      kubelet:
        enabled: false
      cadvisor:
        enabled: false
      apiServer:
        enabled: false
      kubeControllerManager:
        enabled: false
      kubeScheduler:
        enabled: false
      kubeProxy:
        enabled: false
      kubeDNS:
        enabled: false
      node-exporter:
        enabled: false
        deploy: false
      opencost:
        enabled: false
      windows-exporter:
        enabled: false
        deploy: false
      kube-state-metrics:
        metricsTuning:
          excludeMetrics:
            - kube_replicaset_created
            - kube_replicaset_metadata_generation
            - kube_replicaset_status_observed_generation
            - kube_replicaset_status_fully_labeled_replicas
            - kube_replicaset_owner
            - kube_pod_status_reason
            - kube_secret_metadata_resource_version
            - kube_deployment_status_condition

    annotationAutodiscovery:
      enabled: true
      annotations:
        scrape: "prometheus.io/scrape"
        metricsPortNumber: "prometheus.io/port"
        metricsPath: "prometheus.io/path"
        metricsScheme: "prometheus.io/scheme"
      destinations:
        - grafana-cloud-metrics

    clusterEvents:
      enabled: true

    podLogs:
      enabled: true
      destinations:
        - grafana-cloud-logs
        - graylog-otlp
      extraLogProcessingStages: |
        stage.drop {
          expression          = ".*level=debug.*"
          drop_counter_reason = "debug_noise"
        }
        stage.drop {
          expression          = ".*(healthcheck|readiness|liveness|health_check|/healthz|/readyz|/livez).*"
          drop_counter_reason = "probe_noise"
        }
        stage.drop {
          expression          = ".*Reconciliation finished.*"
          drop_counter_reason = "flux_noise"
        }
        stage.drop {
          expression          = ".*\" (2[0-9]{2}|3[0-9]{2}) .*"
          drop_counter_reason = "success_access_logs"
        }
        stage.drop {
          source              = "namespace"
          expression          = "zabbix"
          drop_counter_reason = "zabbix_noise"
        }
        stage.drop {
          expression          = ".*self-reporting-metric\\.prom.*"
          drop_counter_reason = "alloy_self_report_noise"
        }
        stage.drop {
          expression          = ".*(429 Too Many Requests|exceeding post rate limit).*"
          drop_counter_reason = "grafana_cloud_ratelimit_noise"
        }
        stage.drop {
          expression          = ".*\\[WARNING\\] No files matching import glob pattern.*"
          drop_counter_reason = "coredns_noise"
        }

    applicationObservability:
      enabled: true
      receivers:
        otlp:
          grpc:
            enabled: true
            port: 4317
          http:
            enabled: true
            port: 4318
        zipkin:
          enabled: true
          port: 9411

    alloy-metrics:
      enabled: true
      configReloader:
        enabled: false
      controller:
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: kubernetes.io/hostname
                      operator: NotIn
                      values:
                        - kubenuc-m1
                        - kubenuc-w1
      alloy:
        extraEnv:
          - name: CLUSTER_NAME
            value: kubenuc
          - name: NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          - name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
      remoteConfig:
        enabled: false

    alloy-singleton:
      enabled: true
      configReloader:
        enabled: false
      controller:
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: kubernetes.io/hostname
                      operator: NotIn
                      values:
                        - kubenuc-m1
                        - kubenuc-w1
      alloy:
        extraEnv:
          - name: CLUSTER_NAME
            value: kubenuc
          - name: NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          - name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
      remoteConfig:
        enabled: false

    alloy-logs:
      enabled: true
      configReloader:
        enabled: false
      controller:
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: kubernetes.io/hostname
                      operator: NotIn
                      values:
                        - kubenuc-m1
                        - kubenuc-w1
      alloy:
        extraEnv:
          - name: CLUSTER_NAME
            value: kubenuc
          - name: NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          - name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
          - name: NODE_NAME
            valueFrom:
              fieldRef:
                fieldPath: spec.nodeName
      remoteConfig:
        enabled: false

    alloy-receiver:
      enabled: true
      configReloader:
        enabled: false
      controller:
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: kubernetes.io/hostname
                      operator: NotIn
                      values:
                        - kubenuc-m1
                        - kubenuc-w1
      alloy:
        extraPorts:
          - name: otlp-grpc
            port: 4317
            targetPort: 4317
            protocol: TCP
          - name: otlp-http
            port: 4318
            targetPort: 4318
            protocol: TCP
          - name: zipkin
            port: 9411
            targetPort: 9411
            protocol: TCP
        extraEnv:
          - name: CLUSTER_NAME
            value: kubenuc
          - name: NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          - name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
          - name: NODE_NAME
            valueFrom:
              fieldRef:
                fieldPath: spec.nodeName
      remoteConfig:
        enabled: false
