---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jenkins
  namespace: jenkins
spec:
  interval: 15m
  maxHistory: 20
  chart:
    spec:
      chart: jenkins
      version: "5.9.33"
      sourceRef:
        kind: HelmRepository
        name: jenkins-chart
        namespace: flux-system
      interval: 15m
  install:
    createNamespace: true
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  # Audit-first: warn only logs/events on drift between the Helm release and
  # live cluster state, it never corrects it - a safe first step before any
  # app is promoted to mode: enabled (which would actively revert manual or
  # external changes).
  driftDetection:
    mode: warn
  values:
    controller:
      podAnnotations:
        backup.velero.io/backup-volumes: "jenkins-home"
      resources:
        limits:
          cpu: 2
          memory: 10Gi
        requests:
          cpu: 300m
          memory: 2Gi

      ingress:
        enabled: true

        annotations:
          cert-manager.io/cluster-issuer: letsencrypt
        ingressClassName: haproxy

        hostName: ${JENKINS_HOST}
        tls:
        - secretName: ${JENKINS_HOST}-tls
          hosts:
            - ${JENKINS_HOST}

    agent:
      # Chart's own opt-in restricted-PSS securityContext - build agents run
      # arbitrary pipeline-defined code and get no securityContext at all by
      # default (unlike the controller, which is already hardened
      # out-of-the-box). Some job types that write outside the workspace
      # volume (e.g. tool caches under $HOME) may need adjustment after
      # rollout - not verifiable without a live cluster.
      restrictedPssSecurityContext: true
      resources:
        requests:
          cpu: "512m"
          memory: "512Mi"
        limits:
          cpu: "512m"
          memory: "6Gi"

    persistence:
      enabled: true
      storageClass: "openebs-hostpath"
      size: "20Gi"
