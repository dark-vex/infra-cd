---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: velero
  namespace: velero
spec:
  interval: 15m
  maxHistory: 20
  chart:
    spec:
      chart: velero
      version: "12.1.0"
      sourceRef:
        kind: HelmRepository
        name: velero
        namespace: flux-system
      interval: 15m
  install:
    createNamespace: true
    remediation:
      retries: 6
  upgrade:
    remediation:
      retries: 6
  # Audit-first: warn only logs/events on drift between the Helm release and
  # live cluster state, it never corrects it - a safe first step before any
  # app is promoted to mode: enabled (which would actively revert manual or
  # external changes).
  driftDetection:
    mode: warn
  values:
    # image.tag (and the AWS plugin initContainers image below) must always be
    # bumped together with spec.chart.spec.version. Chart 12.x's upgrade-crds
    # pre-install/pre-upgrade hook runs `velero install --crds-only --apply`,
    # and --apply only exists in the velero CLI from v1.18.0 onward - if this
    # image lags behind what the chart's hook expects, the hook Job fails
    # immediately and the HelmRelease upgrade never completes (see the
    # chart 10.1.3->12.1.0 stuck-upgrade incident this comment replaces).
    image:
      repository: velero/velero
      tag: v1.18.1
    # The chart's default kubectl sidecar (used by the pre-install/pre-upgrade
    # upgrade-crds Job) derives its tag from the live cluster's Kubernetes
    # minor version, but docker.io/bitnami/kubectl no longer publishes
    # versioned tags on the free tier (only `latest` + digest artifacts) -
    # the computed "1.33" tag 404s. bitnamilegacy/kubectl still mirrors real
    # versioned tags, pinned here to the cluster's actual minor version.
    kubectl:
      image:
        repository: bitnamilegacy/kubectl
        tag: "1.33.4"
    initContainers:
      - name: velero-plugin-for-aws
        image: velero/velero-plugin-for-aws:v1.14.2
        imagePullPolicy: IfNotPresent
        volumeMounts:
          - mountPath: /target
            name: plugins
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 2Gi
    serviceAccount:
      server:
        create: true
        name: velero
    credentials:
      useSecret: true
      existingSecret: cloud-credentials
    deployNodeAgent: true
    nodeAgent:
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: "4"
          memory: 4Gi
    configuration:
      backupStorageLocation:
        - name: default
          provider: aws
          bucket: Nextcloud-Fastnetserv
          default: true
          config:
            region: minio
            s3ForcePathStyle: "true"
            s3Url: https://s3.eu-central-003.backblazeb2.com
            prefix: ""
            checksumAlgorithm: ""
      volumeSnapshotLocation:
        - name: aws
          provider: openebs.io/cstor-blockstore
          config:
            bucket: Nextcloud-Fastnetserv
            namespace: openebs
            provider: aws
            region: eu-central
            restApiTimeout: 1m
            autoSetTargetIP: "true"
            restoreAllIncrementalSnapshots: "false"
        - name: default
          provider: aws
          config: {}
    # The chart's `schedules:` value prefixes the release name onto the
    # object name (e.g. "velero-fastnet-nextcloud"), which would create a
    # second, duplicate Schedule instead of adopting the existing
    # "schedule-fastnet-nextcloud". extraObjects renders the name literally,
    # so it adopts the existing object in place.
    extraObjects:
      - apiVersion: velero.io/v1
        kind: Schedule
        metadata:
          name: schedule-fastnet-nextcloud
          namespace: velero
        spec:
          schedule: "@every 24h"
          skipImmediately: false
          useOwnerReferencesInBackup: false
          template:
            includedNamespaces:
              - nextcloud-fastnetserv
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: nextcloud
            ttl: 720h0m0s
