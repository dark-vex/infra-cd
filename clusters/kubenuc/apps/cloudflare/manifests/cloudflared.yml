---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cloudflared
  namespace: cloudflare
  labels:
    group: cloudflare
spec:
  selector:
    matchLabels:
      app: cloudflared
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: cloudflared
        group: cloudflare
      annotations:
        # cloudflared reads its config file once at startup and does not
        # hot-reload it - without this, editing the ConfigMap (new ingress
        # rules, etc.) never actually takes effect until something else
        # happens to restart the pods. Generic (not secret-scoped) since the
        # trigger here is the ConfigMap, not a Secret.
        reloader.stakater.com/auto: "true"
    spec:
      tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: "Exists"
        effect: "NoSchedule"
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: node-role.kubernetes.io/master
                operator: In
                values:
                - "true"
      containers:
      - name: cloudflared
        image: cloudflare/cloudflared:2026.7.1@sha256:188bb03589a32affed3cf4d0590565ffe67b78866e6b5582574afab2b705bafe
        args:
        - tunnel
        - --protocol
        - http2
        - --config
        - /etc/cloudflared/config/config.yaml
        - run
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65532
        resources:
          requests:
            cpu: 30m
            memory: 128Mi
          limits:
            cpu: 1000m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /ready
            port: 2000
          failureThreshold: 1
          initialDelaySeconds: 10
          periodSeconds: 10
        volumeMounts:
        - name: config
          mountPath: /etc/cloudflared/config
          readOnly: true
        - name: creds
          mountPath: /etc/cloudflared/creds
          readOnly: true
        - name: cert
          mountPath: /etc/cloudflared
          readOnly: true
      volumes:
      - name: creds
        secret:
          # By default, the credentials file will be created under ~/.cloudflared/<tunnel ID>.json
          # when you run `cloudflared tunnel create`. You can move it into a secret by using:
          # ```sh
          # kubectl create secret generic tunnel-credentials \
          # --from-file=credentials.json=/Users/yourusername/.cloudflared/<tunnel ID>.json
          # ```
          secretName: tunnel-credentials
      # Create a config.yaml file from the ConfigMap below.
      - name: config
        configMap:
          name: cloudflared
          items:
          - key: config.yaml
            path: config.yaml
      - name: cert
        secret:
          secretName: tunnel-pem
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared
  namespace: cloudflare
  labels:
    group: cloudflare
data:
  config.yaml: |
    # Name of the tunnel you want to run
    tunnel: kubenuc
    credentials-file: /etc/cloudflared/creds/credentials.json
    # Serves the metrics server under /metrics and the readiness server under /ready
    metrics: 0.0.0.0:2000
    # Autoupdates applied in a k8s pod will be lost when the pod is removed or restarted, so
    # autoupdate doesn't make sense in Kubernetes. However, outside of Kubernetes, we strongly
    # recommend using autoupdate.
    no-autoupdate: true
    # Keep this list explicit so new DNS records do not become reachable through
    # the tunnel unless they are intentionally added here.
    ingress:
    - hostname: ${NEXTCLOUD_HOST}
      service: https://haproxy-ingress-kubernetes-ingress.haproxy-ingress.svc.cluster.local:443
      originRequest:
        originServerName: ${NEXTCLOUD_HOST}
    - hostname: ${HARBOR_HOST}
      service: https://haproxy-ingress-kubernetes-ingress.haproxy-ingress.svc.cluster.local:443
      originRequest:
        originServerName: ${HARBOR_HOST}
    - hostname: ${JELLYFIN_HOST}
      service: https://haproxy-ingress-kubernetes-ingress.haproxy-ingress.svc.cluster.local:443
      originRequest:
        originServerName: ${JELLYFIN_HOST}
    - hostname: ${PORTAINER_HOST}
      service: https://haproxy-ingress-kubernetes-ingress.haproxy-ingress.svc.cluster.local:443
      originRequest:
        originServerName: ${PORTAINER_HOST}
    - hostname: ${JENKINS_HOST}
      service: https://haproxy-ingress-kubernetes-ingress.haproxy-ingress.svc.cluster.local:443
      originRequest:
        originServerName: ${JENKINS_HOST}
    - hostname: ${SSO_AUTHENTIK_HOST}
      service: https://haproxy-ingress-kubernetes-ingress.haproxy-ingress.svc.cluster.local:443
      originRequest:
        originServerName: ${SSO_AUTHENTIK_HOST}
    - hostname: ${SSO_HOST}
      service: https://haproxy-ingress-kubernetes-ingress.haproxy-ingress.svc.cluster.local:443
      originRequest:
        originServerName: ${SSO_HOST}
    - hostname: ${S3_API_HOST}
      service: https://haproxy-ingress-kubernetes-ingress.haproxy-ingress.svc.cluster.local:443
      originRequest:
        originServerName: ${S3_API_HOST}
    - hostname: ${ARTIFACTORY_HOST}
      service: https://haproxy-ingress-kubernetes-ingress.haproxy-ingress.svc.cluster.local:443
      originRequest:
        originServerName: ${ARTIFACTORY_HOST}
    # Routes directly to the Flux notification-controller's webhook-receiver
    # Service, not through haproxy-ingress - there's no Ingress resource for
    # it, and it's internal ClusterIP traffic with no TLS to terminate.
    # Fallback default (:=) is required, not cosmetic: Flux substitutes any
    # undefined ${VAR} with an empty string rather than failing the
    # reconcile, and an empty `hostname: ""` here would sit ahead of the
    # real `http_status:404` catch-all below and risk matching everything -
    # this guarantees a syntactically real, never-empty hostname even
    # before FLUX_WEBHOOK_HOST is added to cluster-vars.
    - hostname: ${FLUX_WEBHOOK_HOST:=flux-webhook.invalid.example}
      service: http://webhook-receiver.flux-system.svc.cluster.local:80
    - service: http_status:404
