---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 15m
  maxHistory: 20
  chart:
    spec:
      chart: cert-manager
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: flux-system
      interval: 15m
  install:
    crds: CreateReplace
    remediation:
      retries: 5
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 5
  values:
    crds:
      enabled: true
      keep: true
    # allowPrivilegeEscalation/capabilities.drop/readOnlyRootFilesystem are
    # already chart defaults for all 3 components - only runAsUser needs
    # setting to match house style
    securityContext:
      runAsUser: 65532
    webhook:
      securityContext:
        runAsUser: 65532
    cainjector:
      securityContext:
        runAsUser: 65532
