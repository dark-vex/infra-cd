---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 15m
  maxHistory: 20
  chart:
    spec:
      chart: cert-manager
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: flux-system
      interval: 15m
  install:
    crds: CreateReplace
    remediation:
      retries: 5
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 5
  # Audit-first: warn only logs/events on drift between the Helm release and
  # live cluster state, it never corrects it - a safe first step before any
  # app is promoted to mode: enabled (which would actively revert manual or
  # external changes).
  driftDetection:
    mode: warn
  values:
    # Applies to all 3 components (controller/webhook/cainjector) - webhook
    # gates every resource admission cluster-wide, cainjector feeds every
    # cert-manager CA bundle, so both need the same protection as controller.
    global:
      priorityClassName: cluster-infra-critical
    crds:
      enabled: true
      keep: true
    # allowPrivilegeEscalation/capabilities.drop/readOnlyRootFilesystem are
    # already chart defaults for all 3 components - only runAsUser needs
    # setting to match house style
    securityContext:
      runAsUser: 65532
    # Resource values below are conservative documented estimates (not sized
    # from live usage - no Grafana access this session) with headroom built
    # in; flagged for a follow-up tune once real container_memory_working_set_bytes
    # data is available. Policy: requests + memory limits, no CPU limits.
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi
    webhook:
      securityContext:
        runAsUser: 65532
      resources:
        requests:
          cpu: 20m
          memory: 32Mi
        limits:
          memory: 64Mi
    cainjector:
      securityContext:
        runAsUser: 65532
      resources:
        requests:
          cpu: 20m
          memory: 64Mi
        limits:
          memory: 128Mi
