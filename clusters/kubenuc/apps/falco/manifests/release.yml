---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: falco
  namespace: falco
spec:
  interval: 15m
  timeout: 10m
  maxHistory: 20
  chart:
    spec:
      chart: falco
      version: "9.x"
      sourceRef:
        kind: HelmRepository
        name: falcosecurity-charts
        namespace: flux-system
      interval: 15m
  install:
    createNamespace: true
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  valuesFrom:
    - kind: Secret
      name: falcosidekick-credentials
      valuesKey: slack-webhook-url
      targetPath: falcosidekick.config.slack.webhookurl
    - kind: Secret
      name: falcosidekick-credentials
      valuesKey: loki-username
      targetPath: falcosidekick.config.loki.user
    - kind: Secret
      name: falcosidekick-credentials
      valuesKey: loki-password
      targetPath: falcosidekick.config.loki.apikey
  values:
    # Pinned explicitly for stability across chart version bumps (chart is
    # tracked on a floating "9.x" range) rather than relying on the chart's
    # own default drifting silently. requests/memory limit match the
    # chart's own documented sane-default; cpu limit removed per this
    # repo's no-CPU-limits policy.
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: null
        memory: 1024Mi
    driver:
      kind: modern_ebpf

    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule

    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: kubernetes.io/hostname
                  operator: NotIn
                  values:
                    - kubenuc-m1
                    - kubenuc-w1

    falcoctl:
      artifact:
        install:
          enabled: true
        follow:
          enabled: true
      config:
        artifact:
          install:
            refs:
              - falco-rules:5
              - falco-sandbox-rules:5
          follow:
            refs:
              - falco-rules:5
              - falco-sandbox-rules:5

    falco:
      json_output: true
      json_include_output_property: true
      json_include_tags_property: true
      log_stderr: true
      log_syslog: false
      rules_files:
        - /etc/falco/falco_rules.yaml
        - /etc/falco/falco_rules.local.yaml
        - /etc/falco/rules.d

    customRules:
      postgres-exceptions.yaml: |-
        - rule: Read sensitive file untrusted
          override:
            exceptions: append
          exceptions:
            - name: vacuumdb_postgres
              fields: [proc.name, proc.pname]
              comps: [=, in]
              values:
                - [vacuumdb, [post_init.sh]]

    falcosidekick:
      enabled: true
      replicaCount: 1
      # Conservative documented estimate (not sized from live usage - no
      # Grafana access this session); lightweight event-relay component
      resources:
        requests:
          cpu: 20m
          memory: 32Mi
        limits:
          memory: 128Mi
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values:
                      - kubenuc-m1
                      - kubenuc-w1
      config:
        loki:
          hostport: "${GRAFANA_LOKI_HOST}"
          endpoint: "/loki/api/v1/push"
          extralabels: "source:falco,cluster:kubenuc"
        slack:
          minimumpriority: "warning"
