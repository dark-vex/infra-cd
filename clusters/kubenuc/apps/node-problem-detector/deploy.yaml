---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: node-problem-detector
  namespace: flux-system
spec:
  interval: 15m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./clusters/kubenuc/apps/node-problem-detector/manifests
  prune: true
  healthChecks:
    - apiVersion: apps/v1
      kind: DaemonSet
      name: node-problem-detector
      namespace: kube-system
