---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: portainer
  namespace: portainer
spec:
  interval: 15m
  maxHistory: 20
  chart:
    spec:
      chart: portainer
      version: ">=1.0.35"
      sourceRef:
        kind: HelmRepository
        name: portainer-charts
        namespace: flux-system
      interval: 15m
  install:
    createNamespace: true
    remediation:
      retries: 6
  upgrade:
    remediation:
      retries: 6
  # Audit-first: warn only logs/events on drift between the Helm release and
  # live cluster state, it never corrects it - a safe first step before any
  # app is promoted to mode: enabled (which would actively revert manual or
  # external changes).
  driftDetection:
    mode: warn
  values:
    enterpriseEdition:
      enabled: true

    service:
      type: ClusterIP

    tls:
      force: true

    ingress:
      enabled: true
      ingressClassName: haproxy
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt
        haproxy.org/timeout-server: "240s"
        haproxy.org/server-ssl: "true"
        # Opt-in to external-dns (see the External DNS runbook). Adopts the
        # existing live record - proxied:"true" matches its current state,
        # confirmed via `dig portainer.ddlns.net` resolving to Cloudflare
        # edge IPs before this change. Tunnel target comes from cluster-vars
        # (never hardcode FQDNs/tunnel targets in git).
        external-dns.alpha.kubernetes.io/managed-by: external-dns
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
        external-dns.alpha.kubernetes.io/target: ${CLOUDFLARE_TUNNEL_TARGET}
      hosts:
        - host: ${PORTAINER_HOST}
          paths:
            - path: /
      tls:
        - secretName: portainer-tls
          hosts:
            - ${PORTAINER_HOST}

    persistence:
      enabled: true
      size: 10Gi
      accessMode: ReadWriteOnce
      storageClass: openebs-hostpath

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  postRenderers:
    - kustomize:
        patches:
          - patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: portainer
                namespace: portainer
              spec:
                template:
                  spec:
                    containers:
                      # Chart has no securityContext support at all (verified
                      # empty across the chart's full history) - hardened via
                      # strategic-merge patch instead. readOnlyRootFilesystem
                      # and a forced UID are intentionally left out: EE
                      # features (git-based stack deploy, backup/restore) may
                      # write to /tmp, and the existing BoltDB PVC data is
                      # owned by whatever UID the pod ran as before with no
                      # securityContext - no live cluster to verify either is
                      # safe
                      - name: portainer
                        securityContext:
                          allowPrivilegeEscalation: false
                          capabilities:
                            drop:
                              - ALL
                      - name: tailscale
                        image: ghcr.io/tailscale/tailscale:v1.98.8@sha256:d54b2e6a9c09f0e5ec52e82b9ad4af3d446b54a7c08075e92f11c39dd410105f
                        imagePullPolicy: IfNotPresent
                        env:
                          - name: TS_AUTHKEY
                            valueFrom:
                              secretKeyRef:
                                name: tailscale-auth
                                key: credential
                          - name: TS_KUBE_SECRET
                            value: tailscale-state
                          - name: TS_USERSPACE
                            value: "false"
                          - name: TS_HOSTNAME
                            value: portainer
                          - name: TS_ACCEPT_DNS
                            value: "true"
                          - name: TS_STATE_DIR
                            value: /data/tailscale
                        securityContext:
                          allowPrivilegeEscalation: false
                          capabilities:
                            drop:
                              - ALL
                            add:
                              - NET_ADMIN
                          # readOnlyRootFilesystem/runAsUser intentionally
                          # left unset: kernel-mode tailscaled
                          # (TS_USERSPACE=false) needs root to configure
                          # /dev/net/tun and may write its control socket
                          # outside the /data/tailscale mount (e.g. /tmp or
                          # /var/run); can't verify either is safe without a
                          # live cluster. /dev/net/tun is now mounted below -
                          # confirmed live as the cause of "unable to create
                          # tuntap device file: operation not permitted".
                        resources:
                          requests:
                            cpu: 50m
                            memory: 64Mi
                          limits:
                            cpu: 200m
                            memory: 128Mi
                        volumeMounts:
                        - mountPath: /data/tailscale
                          name: data
                        - mountPath: /dev/net/tun
                          name: dev-net-tun
                    volumes:
                      - name: dev-net-tun
                        hostPath:
                          path: /dev/net/tun
                          type: CharDevice
