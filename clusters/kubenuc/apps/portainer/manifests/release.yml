---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: portainer
  namespace: portainer
spec:
  interval: 15m
  maxHistory: 20
  chart:
    spec:
      chart: portainer
      version: ">=1.0.35"
      sourceRef:
        kind: HelmRepository
        name: portainer-charts
        namespace: flux-system
      interval: 15m
  install:
    createNamespace: true
    remediation:
      retries: 6
  upgrade:
    remediation:
      retries: 6
  values:
    enterpriseEdition:
      enabled: true

    service:
      type: ClusterIP

    tls:
      force: true

    ingress:
      enabled: true
      ingressClassName: haproxy
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt
        haproxy.org/timeout-server: "240s"
        haproxy.org/server-ssl: "true"
      hosts:
        - host: ${PORTAINER_HOST}
          paths:
            - path: /
      tls:
        - secretName: portainer-tls
          hosts:
            - ${PORTAINER_HOST}

    persistence:
      enabled: true
      size: 10Gi
      accessMode: ReadWriteOnce
      storageClass: openebs-hostpath

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  postRenderers:
    - kustomize:
        patches:
          - patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: portainer
                namespace: portainer
              spec:
                template:
                  spec:
                    containers:
                      # Chart has no securityContext support at all (verified
                      # empty across the chart's full history) - hardened via
                      # strategic-merge patch instead. readOnlyRootFilesystem
                      # and a forced UID are intentionally left out: EE
                      # features (git-based stack deploy, backup/restore) may
                      # write to /tmp, and the existing BoltDB PVC data is
                      # owned by whatever UID the pod ran as before with no
                      # securityContext - no live cluster to verify either is
                      # safe
                      - name: portainer
                        securityContext:
                          allowPrivilegeEscalation: false
                          capabilities:
                            drop:
                              - ALL
                      - name: tailscale
                        image: ghcr.io/tailscale/tailscale:v1.98.4@sha256:25cde9ad76020b0e29229136d0c38b5962e9a0e1774ffac9b0df68e4a37d6cf0
                        imagePullPolicy: IfNotPresent
                        env:
                          - name: TS_AUTHKEY
                            valueFrom:
                              secretKeyRef:
                                name: tailscale-auth
                                key: credential
                          - name: TS_KUBE_SECRET
                            value: tailscale-state
                          - name: TS_USERSPACE
                            value: "false"
                          - name: TS_HOSTNAME
                            value: portainer
                          - name: TS_ACCEPT_DNS
                            value: "true"
                          - name: TS_STATE_DIR
                            value: /data/tailscale
                        securityContext:
                          allowPrivilegeEscalation: false
                          capabilities:
                            drop:
                              - ALL
                            add:
                              - NET_ADMIN
                          # readOnlyRootFilesystem/runAsUser intentionally
                          # left unset: kernel-mode tailscaled
                          # (TS_USERSPACE=false) needs root to configure
                          # /dev/net/tun and may write its control socket
                          # outside the /data/tailscale mount (e.g. /tmp or
                          # /var/run); can't verify either is safe without a
                          # live cluster
                        resources:
                          requests:
                            cpu: 50m
                            memory: 64Mi
                          limits:
                            cpu: 200m
                            memory: 128Mi
                        volumeMounts:
                        - mountPath: /data/tailscale
                          name: data
