---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: portainer
  namespace: portainer
spec:
  interval: 15m
  maxHistory: 20
  chart:
    spec:
      chart: portainer
      version: ">=1.0.35"
      sourceRef:
        kind: HelmRepository
        name: portainer-charts
        namespace: flux-system
      interval: 15m
  install:
    createNamespace: true
    remediation:
      retries: 6
  upgrade:
    remediation:
      retries: 6
  # Audit-first: warn only logs/events on drift between the Helm release and
  # live cluster state, it never corrects it - a safe first step before any
  # app is promoted to mode: enabled (which would actively revert manual or
  # external changes).
  driftDetection:
    mode: warn
  values:
    enterpriseEdition:
      enabled: true

    service:
      type: ClusterIP

    tls:
      force: true

    ingress:
      enabled: true
      ingressClassName: haproxy
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt
        haproxy.org/timeout-server: "240s"
        haproxy.org/server-ssl: "true"
        external-dns.alpha.kubernetes.io/managed-by: external-dns
        external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
        external-dns.alpha.kubernetes.io/target: ${CLOUDFLARE_TUNNEL_TARGET}
      hosts:
        - host: ${PORTAINER_HOST}
          paths:
            - path: /
      tls:
        - secretName: portainer-tls
          hosts:
            - ${PORTAINER_HOST}

    persistence:
      enabled: true
      size: 10Gi
      accessMode: ReadWriteOnce
      storageClass: openebs-hostpath

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  postRenderers:
    - kustomize:
        patches:
          - patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: portainer
                namespace: portainer
              spec:
                template:
                  spec:
                    containers:
                      - name: portainer
                        securityContext:
                          allowPrivilegeEscalation: false
                          capabilities:
                            drop:
                              - ALL
                      - name: tailscale
                        image: ghcr.io/tailscale/tailscale:v1.98.9@sha256:f15d5d3f4a68773a853180b72496f70ba614b64de0878c43fe3da39fe0afba47
                        imagePullPolicy: IfNotPresent
                        env:
                          - name: TS_AUTHKEY
                            valueFrom:
                              secretKeyRef:
                                name: tailscale-auth
                                key: credential
                          - name: TS_KUBE_SECRET
                            value: tailscale-state
                          - name: TS_USERSPACE
                            value: "false"
                          - name: TS_HOSTNAME
                            value: portainer
                          - name: TS_ACCEPT_DNS
                            value: "true"
                          - name: TS_STATE_DIR
                            value: /data/tailscale
                        securityContext:
                          allowPrivilegeEscalation: false
                          capabilities:
                            drop:
                              - ALL
                            add:
                              - NET_ADMIN
                        resources:
                          requests:
                            cpu: 50m
                            memory: 64Mi
                          limits:
                            cpu: 200m
                            memory: 128Mi
                        volumeMounts:
                        - mountPath: /data/tailscale
                          name: data
                        - mountPath: /dev/net/tun
                          name: dev-net-tun
                    volumes:
                      - name: dev-net-tun
                        hostPath:
                          path: /dev/net/tun
                          type: CharDevice
