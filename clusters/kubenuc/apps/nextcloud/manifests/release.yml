---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
  namespace: nextcloud-fastnetserv
spec:
  interval: 15m
  maxHistory: 20
  chart:
    spec:
      chart: nextcloud
      version: ">=4.5.0"
      sourceRef:
        kind: HelmRepository
        name: nextcloud
        namespace: flux-system
      interval: 15m
  install:
    createNamespace: true
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  # Audit-first: warn only logs/events on drift between the Helm release and
  # live cluster state, it never corrects it - a safe first step before any
  # app is promoted to mode: enabled (which would actively revert manual or
  # external changes).
  driftDetection:
    mode: warn
  values:
    startupProbe:
      enabled: true
      initialDelaySeconds: 30
    image:
      repository: nextcloud
      tag: 34.0-apache@sha256:6444fc5450302534e850b4d23c05b5f06c7b0d25bd5ece716452061454699c58
      pullPolicy: IfNotPresent
    podAnnotations:
      backup.velero.io/backup-volumes: "nextcloud-main"
      secret.reloader.stakater.com/auto: "true"
    ingress:
      enabled: true
      className: haproxy
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt"
      tls:
        - secretName: nx-fastnet-tls
          hosts:
            - ${NEXTCLOUD_HOST}
    nextcloud:
      host: ${NEXTCLOUD_HOST}
      ## Use an existing secret
      existingSecret:
        enabled: true
        secretName: nextcloud
        usernameKey: nextcloud-username
        passwordKey: nextcloud-password
      podSecurityContext:
        fsGroup: 33
        fsGroupChangePolicy: "OnRootMismatch"
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
          add:
            - AUDIT_WRITE
            - CHOWN
            - DAC_OVERRIDE
            - FOWNER
            - KILL
            - NET_BIND_SERVICE
            - SETGID
            - SETUID

    resources:
      requests:
        cpu: 1000m
        memory: 256Mi
      limits:
        memory: 4096Mi
    internalDatabase:
      enabled: false
    externalDatabase:
      enabled: true
      type: postgresql
      ## Use a existing secret
      existingSecret:
        enabled: true
        secretName: nextcloud-db-secret
        usernameKey: pgdb-username
        passwordKey: pgdb-password
        hostKey: server
        databaseKey: database
    mariadb:
      enabled: false
    redis:
      enabled: true
      master:
        persistence:
          storageClass: openebs-hostpath
        resources:
          limits:
            memory: 1024Mi
          requests:
            cpu: 500m
            memory: 1024Mi
      replica:
        replicaCount: 2
        persistence:
          storageClass: openebs-hostpath
        resources:
          limits:
            cpu: 500m
            memory: 1024Mi
          requests:
            cpu: 500m
            memory: 1024Mi
    persistence:
      enabled: true
      storageClass: openebs-hostpath
      size: 160Gi
    metrics:
      enabled: false
      podAnnotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9205"
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 500m
          memory: 512Mi
    cronjob:
      enabled: true
      sidecar:
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
            add:
              - SETGID
              - SETUID
    nginx:
      enabled: false
      securityContext:
        fsGroup: 33
        fsGroupChangePolicy: "OnRootMismatch"
