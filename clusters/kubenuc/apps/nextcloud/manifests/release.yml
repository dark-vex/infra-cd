---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
  namespace: nextcloud-fastnetserv
spec:
  interval: 15m
  maxHistory: 20
  chart:
    spec:
      chart: nextcloud
      version: ">=4.5.0"
      sourceRef:
        kind: HelmRepository
        name: nextcloud
        namespace: flux-system
      interval: 15m
  install:
    createNamespace: true
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  values:
    startupProbe:
      enabled: true
      initialDelaySeconds: 30
    image:
      repository: nextcloud
      tag: 34.0-apache@sha256:e74a21b3d94e016831f06a6cdb3891f48ee981f6679df0bbd29af6e6f890e7c4
      pullPolicy: IfNotPresent
    podAnnotations:
      backup.velero.io/backup-volumes: "nextcloud-main"
    ingress:
      enabled: true
      className: haproxy
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt"
      tls:
        - secretName: nx-fastnet-tls
          hosts:
            - ${NEXTCLOUD_HOST}
    nextcloud:
      host: ${NEXTCLOUD_HOST}
      ## Use an existing secret
      existingSecret:
        enabled: true
        secretName: nextcloud
        usernameKey: nextcloud-username
        passwordKey: nextcloud-password
      podSecurityContext:
        fsGroup: 33
        fsGroupChangePolicy: "OnRootMismatch"
      # readOnlyRootFilesystem intentionally not set: entrypoint.sh writes
      # /usr/local/etc/php/conf.d/redis-session.ini on every start (REDIS_HOST
      # is set), and apache2-foreground writes /var/run/apache2 +
      # /var/lock/apache2 - none of these are covered by existing mounts.
      # runAsUser intentionally not set: the existing 160Gi PVC was written
      # by the image's default www-data (uid 33, matched by fsGroup above);
      # no live cluster to verify a UID switch is safe
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        runAsNonRoot: true

    resources:
      requests:
        cpu: 1000m
        memory: 256Mi
      limits:
        memory: 4096Mi
    internalDatabase:
      enabled: false
    externalDatabase:
      enabled: true
      type: postgresql
      ## Use a existing secret
      existingSecret:
        enabled: true
        secretName: nextcloud-db-secret
        usernameKey: pgdb-username
        passwordKey: pgdb-password
        hostKey: server
        databaseKey: database
    mariadb:
      enabled: false
    redis:
      enabled: true
      master:
        persistence:
          storageClass: openebs-hostpath
        resources:
          limits:
            memory: 1024Mi
          requests:
            cpu: 500m
            memory: 1024Mi
      replica:
        replicaCount: 2
        persistence:
          storageClass: openebs-hostpath
        resources:
          limits:
            cpu: 500m
            memory: 1024Mi
          requests:
            cpu: 500m
            memory: 1024Mi
    persistence:
      enabled: true
      storageClass: openebs-hostpath
      size: 160Gi
    metrics:
      enabled: false
      podAnnotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9205"
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 500m
          memory: 512Mi
    cronjob:
      enabled: true
      # cronjob.securityContext was a dead no-op key - the chart only reads
      # cronjob.sidecar.securityContext (container-level) when cronjob.type
      # is unset/"sidecar" (the default, and what this deployment actually
      # runs - no separate CronJob resource exists). Pod-level fsGroup is
      # already inherited from nextcloud.podSecurityContext above, shared
      # pod-wide with the sidecar container. runAsNonRoot intentionally NOT
      # set - the chart's own docs state crond requires root in sidecar mode.
      sidecar:
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
    nginx:
      enabled: false
      securityContext:
        fsGroup: 33
        fsGroupChangePolicy: "OnRootMismatch"
