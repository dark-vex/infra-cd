---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
  namespace: nextcloud-fastnetserv
spec:
  interval: 15m
  maxHistory: 20
  chart:
    spec:
      chart: nextcloud
      version: ">=4.5.0"
      sourceRef:
        kind: HelmRepository
        name: nextcloud
        namespace: flux-system
      interval: 15m
  install:
    createNamespace: true
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  values:
    startupProbe:
      enabled: true
      initialDelaySeconds: 30
    image:
      repository: nextcloud
      tag: 34.0-apache@sha256:6444fc5450302534e850b4d23c05b5f06c7b0d25bd5ece716452061454699c58
      pullPolicy: IfNotPresent
    podAnnotations:
      backup.velero.io/backup-volumes: "nextcloud-main"
      # nextcloud.existingSecret (admin) and externalDatabase.existingSecret
      # (DB) below are only read at container startup - without this,
      # rotating either 1Password-synced secret never restarts the pod.
      # Scoped to secrets only so a config-only chart bump doesn't also
      # trigger a redundant restart.
      secret.reloader.stakater.com/auto: "true"
    ingress:
      enabled: true
      className: haproxy
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt"
      tls:
        - secretName: nx-fastnet-tls
          hosts:
            - ${NEXTCLOUD_HOST}
    nextcloud:
      host: ${NEXTCLOUD_HOST}
      ## Use an existing secret
      existingSecret:
        enabled: true
        secretName: nextcloud
        usernameKey: nextcloud-username
        passwordKey: nextcloud-password
      podSecurityContext:
        fsGroup: 33
        fsGroupChangePolicy: "OnRootMismatch"
      # readOnlyRootFilesystem intentionally not set: entrypoint.sh writes
      # /usr/local/etc/php/conf.d/redis-session.ini on every start (REDIS_HOST
      # is set), and apache2-foreground writes /var/run/apache2 +
      # /var/lock/apache2 - none of these are covered by existing mounts.
      # runAsNonRoot/runAsUser intentionally not set: the apache image must
      # start as root (entrypoint chown/rsync of app data, apache binds :80,
      # then drops to www-data itself); kubelet rejects runAsNonRoot outright
      # because the image USER is root. Same pattern as jellyfin. Capabilities
      # below are the minimal set for that root->www-data lifecycle; all are
      # in the PSS "baseline" allowed list.
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
          add:
            - AUDIT_WRITE       # su/PAM session during entrypoint upgrade steps
            - CHOWN             # entrypoint rsync --chown www-data:root
            - DAC_OVERRIDE      # root traversing/writing www-data-owned files
            - FOWNER            # chmod/utime on files owned by www-data
            - KILL              # apache root parent signals www-data workers
            - NET_BIND_SERVICE  # apache binds :80
            - SETGID            # privilege drop to www-data (+ setgroups)
            - SETUID            # privilege drop to www-data

    resources:
      requests:
        cpu: 1000m
        memory: 256Mi
      limits:
        memory: 4096Mi
    internalDatabase:
      enabled: false
    externalDatabase:
      enabled: true
      type: postgresql
      ## Use a existing secret
      existingSecret:
        enabled: true
        secretName: nextcloud-db-secret
        usernameKey: pgdb-username
        passwordKey: pgdb-password
        hostKey: server
        databaseKey: database
    mariadb:
      enabled: false
    redis:
      enabled: true
      master:
        persistence:
          storageClass: openebs-hostpath
        resources:
          limits:
            memory: 1024Mi
          requests:
            cpu: 500m
            memory: 1024Mi
      replica:
        replicaCount: 2
        persistence:
          storageClass: openebs-hostpath
        resources:
          limits:
            cpu: 500m
            memory: 1024Mi
          requests:
            cpu: 500m
            memory: 1024Mi
    persistence:
      enabled: true
      storageClass: openebs-hostpath
      size: 160Gi
    metrics:
      enabled: false
      podAnnotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9205"
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 500m
          memory: 512Mi
    cronjob:
      enabled: true
      # cronjob.securityContext was a dead no-op key - the chart only reads
      # cronjob.sidecar.securityContext (container-level) when cronjob.type
      # is unset/"sidecar" (the default, and what this deployment actually
      # runs - no separate CronJob resource exists). Pod-level fsGroup is
      # already inherited from nextcloud.podSecurityContext above, shared
      # pod-wide with the sidecar container. runAsNonRoot intentionally NOT
      # set - the chart's own docs state crond requires root in sidecar mode.
      sidecar:
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
            add:
              - SETGID  # busybox crond setgroups/setgid to www-data per job
              - SETUID  # busybox crond setuid to www-data per job
    nginx:
      enabled: false
      securityContext:
        fsGroup: 33
        fsGroupChangePolicy: "OnRootMismatch"
