---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: nextcloud-db-backup
  namespace: nextcloud-fastnetserv
spec:
  schedule: "0 0 * * 0"
  jobTemplate:
    spec:
      template:
        spec:
          dnsConfig:
            options:
              - name: ndots
                value: "2"
          containers:
          - name: pgbackup
            image: ghcr.io/solectrus/postgres-s3-backup:17@sha256:3a5d281955fd6bcdbb97628979ab4df83243253e1f5ebe90b2db13b05d65eda5
            imagePullPolicy: IfNotPresent
            # backup.sh writes `pg_dump ... > db.dump` as a relative path with
            # no WORKDIR set in the image (inherits the postgres:alpine base's
            # default, effectively /) - readOnlyRootFilesystem needs an
            # explicit writable workingDir for that write to land somewhere.
            # But that also breaks the initial `sh run.sh` / `source ./env.sh`
            # lookups since none of the image's scripts exist at /backup -
            # copy them in first, then run.
            workingDir: /backup
            command: ["sh", "-c"]
            args:
              - cp /run.sh /env.sh /backup.sh /restore.sh /backup/ && exec sh run.sh
            env:
            - name: S3_REGION
              value: "eu-south-1"
            - name: PGDUMP_EXTRA_OPTS
              value: "--schema=public --blobs"
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: nextcloud-db-backup
                  key: S3_ACCESS_KEY_ID
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: nextcloud-db-backup
                  key: S3_SECRET_ACCESS_KEY
            - name: S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: nextcloud-db-backup
                  key: S3_BUCKET
            - name: S3_PREFIX
              value: "nextcloud-db-backup"
            - name: POSTGRES_HOST
              value: "postgresql-nuc-cluster.databases"
            - name: POSTGRES_DATABASE
              valueFrom:
                secretKeyRef:
                  name: nextcloud-db-secret
                  key: database
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: nextcloud-db-secret
                  key: pgdb-username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nextcloud-db-secret
                  key: pgdb-password
            - name: BACKUP_KEEP_DAYS
              value: "60"
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                - ALL
              readOnlyRootFilesystem: true
              runAsNonRoot: true
              runAsUser: 65532
            volumeMounts:
            - name: backup
              mountPath: /backup
          volumes:
          - name: backup
            emptyDir: {}
          restartPolicy: OnFailure
