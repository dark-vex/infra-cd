---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis
  namespace: harbor
spec:
  interval: 15m
  maxHistory: 20
  chart:
    spec:
      chart: redis
      version: "27.0.13"
      sourceRef:
        kind: HelmRepository
        name: bitnami-chart
        namespace: flux-system
      interval: 15m
  install:
    createNamespace: true
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  # Audit-first: warn only logs/events on drift between the Helm release and
  # live cluster state, it never corrects it - a safe first step before any
  # app is promoted to mode: enabled (which would actively revert manual or
  # external changes).
  driftDetection:
    mode: warn
  values:
    usePassword: true
    usePasswordFiles: true
    existingSecret: redis-password-secret
    auth:
      enabled: false
    master:
      resourcesPreset: small
      persistence:
        storageClass: openebs-hostpath
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: redis
              app.kubernetes.io/component: replica
    replica:
      resourcesPreset: small
      persistence:
        storageClass: openebs-hostpath
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: redis
              app.kubernetes.io/component: replica
