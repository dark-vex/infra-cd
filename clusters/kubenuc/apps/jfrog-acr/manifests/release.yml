---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: artifactory
  namespace: jfrog
spec:
  interval: 15m
  maxHistory: 20
  chart:
    spec:
      chart: artifactory-jcr
      version: "107.146.27"
      sourceRef:
        kind: HelmRepository
        name: jfrog-chart
        namespace: flux-system
      interval: 15m
  install:
    createNamespace: true
    remediation:
      retries: 6
    timeout: 15m
  upgrade:
    remediation:
      retries: 6
    timeout: 30m
  # Audit-first: warn only logs/events on drift between the Helm release and
  # live cluster state, it never corrects it - a safe first step before any
  # app is promoted to mode: enabled (which would actively revert manual or
  # external changes).
  driftDetection:
    mode: warn
  values:
    artifactory:
      artifactory:
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "4Gi"
            cpu: "1"
        ## The following Java options are passed to the java process running Artifactory.
        ## You should set them according to the resources set above.
        ## IMPORTANT: Make sure resources.limits.memory is at least 1G more than Xmx.
        javaOpts:
          xms: "1g"
          xmx: "3g"

      nginx:
        enabled: false

      ingress:
        enabled: true
        ## Used to create an Ingress record.
        hosts:
        - ${ARTIFACTORY_HOST}
        className: "haproxy"
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt
        tls:
        - secretName: artifactory-tls
          hosts:
            - ${ARTIFACTORY_HOST}
