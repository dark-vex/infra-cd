---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: teleport-agent
  namespace: teleport
spec:
  interval: 5m
  chart:
    spec:
      chart: teleport-kube-agent
      version: ">=17.0.0"
      sourceRef:
        kind: HelmRepository
        name: teleport-charts
        namespace: flux-system
      interval: 5m
  install:
    createNamespace: true
    remediation:
      retries: 6
  upgrade:
    remediation:
      retries: 6
  values:
    proxyAddr: ${TELEPORT_HOST}:443
    kubeClusterName: "oc-ampere"
    joinTokenSecret:
      create: false
      name: "teleport-kube-agent-join-token"
    labels:
      teleport.internal/resource-id: fcb2caca-6eb1-4dd4-94b6-92e6fbaa3f4a
    roles: kube,app,discovery
