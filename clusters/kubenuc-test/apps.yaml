apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
    - name: cluster-vars
    - name: charts
    - name: charts-test
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./clusters/kubenuc-test/apps
  prune: true
  timeout: 5m0s
  wait: true
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-vars
