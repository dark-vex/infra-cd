---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: portainer
  namespace: flux-system
spec:
  dependsOn:
    - name: openebs
  interval: 15m
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: portainer
      namespace: portainer
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./clusters/kubenuc/apps/portainer/manifests
  prune: true
  patches:
    - target:
        kind: HelmRelease
        name: portainer
      patch: |
        - op: replace
          path: /spec/values/persistence/size
          value: 1Gi
        - op: remove
          path: /spec/values/resources
        - op: replace
          path: /spec/values/ingress/hosts/0/host
          value: ${TST_PORTAINER_HOST}
        - op: replace
          path: /spec/values/ingress/tls/0/hosts/0
          value: ${TST_PORTAINER_HOST}
        - op: replace
          path: /spec/values/ingress/tls/0/secretName
          value: portainer-tst-tls
        - op: remove
          path: /spec/postRenderers
    - target:
        kind: Role
        name: tailscale-state
      patch: |
        $patch: delete
        apiVersion: rbac.authorization.k8s.io/v1
        kind: Role
        metadata:
          name: tailscale-state
    - target:
        kind: RoleBinding
        name: tailscale-state
      patch: |
        $patch: delete
        apiVersion: rbac.authorization.k8s.io/v1
        kind: RoleBinding
        metadata:
          name: tailscale-state

