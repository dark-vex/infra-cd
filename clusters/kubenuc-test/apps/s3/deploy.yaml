# TMP namespace creation
---
apiVersion: v1
kind: Namespace
metadata:
  name: nextcloud-fastnetserv
  annotations:
    kustomize.toolkit.fluxcd.io/prune: disabled
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: s3
  namespace: flux-system
spec:
  dependsOn:
    - name: openebs
  targetNamespace: nextcloud-fastnetserv
  path: ./clusters/kubenuc/apps/s3/manifests
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  interval: 15m
  postBuild:
    substituteFrom:
      - kind: Secret
        name: cluster-vars
  patches:
    - target:
        kind: HelmRelease
        name: s3
      patch: |
        - op: replace
          path: /spec/values/volume/replicaCount
          value: 1
        - op: replace
          path: /spec/values/volume/persistence/size
          value: 1Gi
        - op: replace
          path: /spec/values/s3/ingress/host
          value: ${TST_S3_API_HOST}
        - op: replace
          path: /spec/values/s3/ingress/tls
          value:
            - secretName: s3-tls
              hosts:
              - ${TST_S3_API_HOST}
