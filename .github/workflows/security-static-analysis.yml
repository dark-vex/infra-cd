---
name: security-static-analysis

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/security-static-analysis.yml'
      - '.kube-linter.yaml'
      - 'clusters/**'
      - 'terraform/**'
  push:
    branches: [main]
    paths:
      - '.github/workflows/security-static-analysis.yml'
      - '.kube-linter.yaml'
      - 'clusters/**'
      - 'terraform/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  kube-linter:
    name: Kubernetes admission lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install KubeLinter
        env:
          KUBE_LINTER_VERSION: v0.8.3
        run: |
          set -euo pipefail
          curl -fsSL \
            "https://github.com/stackrox/kube-linter/releases/download/${KUBE_LINTER_VERSION}/kube-linter-linux.tar.gz" \
            -o kube-linter.tar.gz
          tar -xzf kube-linter.tar.gz
          sudo install kube-linter /usr/local/bin/kube-linter

      - name: Run KubeLinter
        run: |
          kube-linter lint \
            clusters/kubenuc/apps \
            clusters/kubenuc-test/apps \
            clusters/k8s-vms-daniele/apps \
            clusters/k3s-prod-test/apps \
            clusters/k3s-rabbit/apps \
            clusters/oc-ampere/apps \
            --config .kube-linter.yaml

  checkov:
    name: Terraform IaC scan (checkov)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.14'

      - name: Install checkov
        run: pip install checkov==3.3.6

      - name: Run checkov
        run: |
          mkdir -p checkov-report
          checkov \
            --directory terraform/ \
            --framework terraform \
            --soft-fail \
            --compact \
            --skip-download \
            --skip-path 'terraform/grafana/alerting\.tf$' \
            --output cli \
            --output sarif \
            --output-file-path checkov-report
        # --skip-download: no external module/provider fetching or Prisma Cloud
        # phone-home needed for a static scan.
        # --skip-path on alerting.tf: python-hcl2 (checkov's parser) treats a
        # bare `for` attribute as the reserved for-expression keyword even
        # outside a comprehension, and fails to parse the Grafana provider's
        # `rule { for = "6h" ... }` block. Confirmed independently via
        # `python3 -c "import hcl2; hcl2.load(...)"` — real `terraform
        # validate`/`fmt`/`plan` handle this file fine; it's a parser
        # limitation, not a finding. Audit-first: soft-fail while findings
        # are triaged; flip to hard-fail per directory once addressed.

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: checkov-report/results_sarif.sarif
          category: checkov
